# Cloudflare Pages / Workers project config.
# For local dev (`wrangler pages dev .`) only — production env vars
# are set in the Cloudflare dashboard under Pages → Project → Settings →
# Environment variables (Production + Preview).
name = "debtiq"
compatibility_date = "2025-05-01"
pages_build_output_dir = "."

# Local-dev defaults. Put real ANTHROPIC_API_KEY / SUPABASE_* values in a
# `.dev.vars` file (gitignored) — wrangler picks them up automatically:
#   ANTHROPIC_API_KEY="sk-ant-..."
#   SUPABASE_URL="https://xxx.supabase.co"
#   SUPABASE_ANON_KEY="..."
# When SUPABASE_URL / SUPABASE_ANON_KEY are unset the app falls back to
# the static demo path, exactly the same as on Netlify.
[vars]
# (intentionally empty — secrets only via .dev.vars / dashboard)
