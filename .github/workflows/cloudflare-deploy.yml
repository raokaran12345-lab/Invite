name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main, claude/debtiq-access-bDD0b ]
  workflow_dispatch:

# The cleanest path is the Cloudflare Pages → Git integration set up in the
# dashboard (pushes deploy automatically with zero workflow needed). This
# action is a fallback for teams who'd rather drive deploys from CI.
#
# To enable: add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID under
# GitHub → Settings → Secrets and variables → Actions. With those unset the
# workflow logs a skip and exits clean (no failure).
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Cloudflare Pages (production)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npx --yes wrangler@latest pages deploy . --project-name=debtiq --branch=main

      - name: Skipped — secrets not set
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Skipping deploy: set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in"
          echo "GitHub → Settings → Secrets and variables → Actions."
          echo "Token: Cloudflare → My Profile → API Tokens → Edit Cloudflare Workers template."
          echo "Account ID: Cloudflare → Workers & Pages → right sidebar."
          echo
          echo "Recommended alternative: connect the repo directly in the Cloudflare Pages"
          echo "dashboard for automatic deploys with no workflow secret management."
