name: Secret guard

# Safety net for the founder's worry: fail loudly if an API key or other secret
# is ever committed to the repo, on every push and PR. The real protection is that
# the key lives ONLY in Cloudflare env vars (never in code) — this is belt-and-braces.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed secrets
        run: |
          set -e
          # Patterns: Anthropic keys, AWS keys, generic private keys, Stripe live keys.
          PATTERN='sk-ant-[A-Za-z0-9_-]{12,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|sk_live_[0-9a-zA-Z]{16,}'
          # Search tracked files only; exclude this workflow (it contains the patterns).
          if git grep -nIE "$PATTERN" -- . ':!.github/workflows/secret-guard.yml' ; then
            echo "::error::A secret-like string was found in committed files. Remove it and ROTATE the key immediately."
            exit 1
          fi
          echo "OK — no committed secrets detected."
