<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebtIQ v6 — Mortgage Broker Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DEBTIQ v6 — Design System
   ============================================================ */
:root{
  /* === Editorial credit-memo + clinical precision === */
  /* Surfaces */
  --page:#EEEAE1;          /* warm page background */
  --paper:#FBFAF6;         /* editorial output surface (verdicts, ledgers, pack, commentary) */
  --white:#FFFFFF;         /* clinical surface (forms, doc tables, copilot, modals) */
  --ink:#1E2A44;           /* primary structural & UI accent (replaces violet) */
  --steel:#3B6FB5;         /* interactive: links / hover / focus */
  /* Hairlines */
  --line:#E7E2D6;          /* warm hairline on paper */
  --line2:#EAEDF1;         /* cool hairline on white / clinical */
  /* Text */
  --t1:#1A1A22;
  --t2:#494C55;
  --t3-warm:#8A8270;       /* labels on paper */
  --t3-cool:#6B7280;       /* labels on white */
  --t4:#9CA3AF;
  /* Status (editorial-deepened) */
  --green:#0B6B4F;         /* PASS / verified */
  --amber:#9A5A00;         /* BORDERLINE / caution */
  --red:#A92626;           /* FAIL / review-required */
  /* Brand mark gradient — used ONLY on the logo glyph */
  --logo-grad:linear-gradient(135deg,#5B4FF5,#8B5CF6,#A78BFA);
  /* === Back-compat aliases (existing code cascades to new values) === */
  --bg:var(--page);
  --surface:var(--white);
  --brand:var(--ink);
  --brand-grad:var(--ink);          /* legacy var now flat ink; logo overrides to --logo-grad */
  --brand-bg:rgba(30,42,68,.06);    /* ink tint replaces violet tint */
  --brand-soft:rgba(30,42,68,.08);
  --border:var(--line2);
  --t3:var(--t3-cool);
  --teal:var(--steel);
  --red-bg:#FBEDEA;
  /* Radii — tightened: cards/inputs/buttons 8px, status pills 100px, clinical 2px */
  --r-card:8px;
  --r-input:8px;
  --r-btn:8px;
  --r-pill:100px;
  --r-clinical:2px;
  /* Shadows — minimal; hairlines do the work */
  --sh-1:0 1px 2px rgba(60,50,30,.04);
  --sh-2:0 1px 2px rgba(60,50,30,.06);
  --sh-brand:none;
  /* Type */
  --mono:'DM Mono',monospace;
  --serif:'Newsreader',Georgia,serif;
  /* Shell */
  --sidebar-w:240px;
  --copilot-w:320px;
  --timeline-h:80px;
  --timeline-h-expanded:240px;
  --cmdbar-h:52px;
  --dealstrip-h:40px;
  --tabstrip-h:40px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--t1)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Animations ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(91,79,245,.5),0 8px 24px rgba(91,79,245,.3)}50%{box-shadow:0 0 28px rgba(139,92,246,.85),0 8px 32px rgba(139,92,246,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}}

/* ============================================================
   LOGIN
   ============================================================ */
#login{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 25% 20%,#2A2350,#15122E 55%,#0B0920);
  padding:20px;
}
.login-card{
  width:420px;max-width:100%;background:var(--surface);
  border-radius:40px;padding:48px 40px;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
  animation:slideUp .4s cubic-bezier(.22,1,.36,1);
  text-align:center;
}
.login-logo{
  width:72px;height:72px;border-radius:22px;margin:0 auto 22px;
  background:var(--logo-grad);          /* brand mark identity — the only gradient surface */
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:800;color:#fff;
}
.login-card h1{font-size:24px;font-weight:800;margin-bottom:6px}
.login-card p.sub{color:var(--t3);margin-bottom:28px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--border);
  border-radius:var(--r-input);background:#FbFbFc;transition:.18s;
}
.field input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(91,79,245,.12)}
.btn-grad{
  width:100%;padding:14px;border-radius:var(--r-btn);color:#fff;font-weight:700;font-size:15px;
  background:var(--brand-grad);box-shadow:var(--sh-brand);transition:.18s;margin-top:6px;
}
.btn-grad:hover{filter:brightness(1.08);transform:translateY(-1px)}
.demo-creds{
  margin-top:22px;font-size:12px;color:var(--t3);
  background:#F4F5F7;border-radius:12px;padding:12px;line-height:1.7;
}
.demo-creds b{color:var(--t2)}

/* ============================================================
   OPERATING SYSTEM SHELL
   ============================================================ */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
.logo-mark{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:var(--logo-grad);          /* brand mark identity — the only gradient surface */
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:19px;
}
.wordmark{font-weight:800;font-size:18px;letter-spacing:-.4px}
.avatar{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:var(--brand-grad);color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}

/* Command Bar */
#cmdBar{
  height:var(--cmdbar-h);flex-shrink:0;background:var(--surface);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 18px;gap:14px;z-index:100;
}
.cmd-left{display:flex;align-items:center;gap:9px;flex-shrink:0}
.cmd-centre{flex:1;max-width:480px;margin:0 auto;position:relative}
#globalSearch{
  width:100%;padding:8px 14px;border:1.5px solid var(--border);
  border-radius:var(--r-pill);font-size:13.5px;background:var(--bg);outline:none;transition:.15s;
}
#globalSearch:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(91,79,245,.1)}
.cmd-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto}
.btn-sm{padding:8px 14px;border-radius:var(--r-btn);font-size:13px}
.cmd-icon-btn{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--t3);transition:.13s;
}
.cmd-icon-btn:hover{background:var(--brand-bg);color:var(--brand)}

/* Search results */
.search-results{
  position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;
  border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh-2);
  z-index:200;display:none;overflow:hidden;
}
.sr-item{padding:10px 14px;cursor:pointer;transition:.12s}
.sr-item:hover{background:var(--bg)}
.sr-name{font-weight:700;font-size:13.5px}
.sr-meta{font-size:12px;color:var(--t3);margin-top:2px}
.sr-empty{padding:14px;text-align:center;color:var(--t3);font-size:13px}

/* Deal Strip */
#dealStrip{
  height:var(--dealstrip-h);flex-shrink:0;background:#F9FAFB;
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 16px;gap:6px;font-size:12.5px;overflow:hidden;
}
.deal-back{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:0 6px 0 0;transition:color .13s}
.deal-back:hover{color:var(--brand)}
.ds-id{font-family:var(--mono);color:var(--t3)}
.ds-name{font-weight:700;color:var(--t1)}
.ds-lender{color:var(--t2)}
.ds-amt{color:var(--t2)}
.ds-sep{color:var(--t4)}
.ds-metrics{margin-left:auto;display:flex;gap:8px}
.ds-metric{
  font-size:12px;font-weight:700;font-family:var(--mono);padding:2px 8px;
  background:#fff;border:1px solid var(--border);border-radius:var(--r-pill);white-space:nowrap;
}

/* Tab Strip */
#tabStrip{
  height:var(--tabstrip-h);flex-shrink:0;background:var(--surface);
  border-bottom:1px solid var(--border);display:flex;align-items:flex-end;
  padding:0 16px;gap:2px;overflow-x:auto;
}
.os-tab{
  padding:8px 16px;font-size:13.5px;font-weight:600;color:var(--t3);background:none;border:none;
  border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:.13s;
  display:flex;align-items:center;gap:6px;
}
.os-tab:hover{color:var(--t1)}
.os-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab-badge{font-size:9px;font-weight:800;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:5px;letter-spacing:.04em}

/* Main canvas */
#canvas{flex:1;display:flex;overflow:hidden;min-height:0}
#workspace{flex:1;overflow-y:auto;min-width:0}
.workspace-page{padding:24px;min-height:100%;animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}

/* AI Copilot panel */
#copilotPanel{
  width:var(--copilot-w);flex-shrink:0;background:var(--surface);
  border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;
}
.cp-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cp-title{font-size:13px;font-weight:700}
.cp-model{font-size:10px;color:var(--t4);margin-left:2px}
.cp-dot{width:7px;height:7px;border-radius:50%;background:var(--t4);margin-left:auto;animation:pulse 2s infinite}
.cp-insights{flex:1;overflow-y:auto;padding:10px}
.copilot-insight{
  display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:10px;margin-bottom:7px;
  background:var(--bg);border-left:3px solid var(--border);font-size:12.5px;
}
.ci-icon{flex-shrink:0;font-size:13px}
.ci-body{flex:1}
.ci-text{color:var(--t2);line-height:1.5}
.ci-action-btn{display:block;margin-top:6px;font-size:11.5px;font-weight:700;color:var(--brand);background:none;border:none;cursor:pointer;padding:0}
.copilot-success{border-left-color:var(--green);background:rgba(5,150,105,.05)}
.copilot-warning{border-left-color:var(--amber);background:rgba(217,119,6,.05)}
.copilot-error{border-left-color:var(--red);background:rgba(220,38,38,.05)}
.copilot-suggestion{border-left-color:var(--brand);background:rgba(91,79,245,.05)}
.copilot-info{border-left-color:#60A5FA;background:rgba(96,165,250,.06)}
.copilot-urgent{border-left-color:var(--red);background:var(--red-bg)}
.cp-actions{
  padding:9px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  display:flex;gap:6px;flex-shrink:0;
}
.cp-actions button{flex:1;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:15px;transition:.13s}
.cp-actions button:hover{background:var(--brand-bg);border-color:var(--brand)}
.cp-chat{height:160px;flex-shrink:0;display:flex;flex-direction:column;border-top:1px solid var(--border)}
.cp-chat-log{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.cp-msg{font-size:12px;padding:7px 10px;border-radius:10px;line-height:1.5;max-width:96%}
.cp-user{background:var(--brand-soft);color:var(--brand);align-self:flex-end}
.cp-ai{background:var(--bg);color:var(--t2);align-self:flex-start}
.cp-chat-input{display:flex;border-top:1px solid var(--border);flex-shrink:0}
#cpQuery{flex:1;padding:9px 12px;border:none;outline:none;font-size:12.5px;background:#fff}
.cp-chat-input button{padding:0 13px;background:var(--brand);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:14px}

/* Live timeline */
#liveTimeline{
  height:var(--timeline-h);flex-shrink:0;background:#0F0F1A;color:rgba(255,255,255,.7);
  display:flex;align-items:center;padding:0 20px;font-size:12px;cursor:pointer;overflow:hidden;
  transition:height .3s cubic-bezier(.22,1,.36,1);
}
#liveTimeline.expanded{height:var(--timeline-h-expanded);align-items:flex-start;padding-top:14px;flex-wrap:wrap;gap:8px 0}
.tl-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-right:14px;flex-shrink:0}
#tlEvents{display:flex;align-items:center;overflow:hidden;flex:1}
#liveTimeline.expanded #tlEvents{flex-wrap:wrap}
.tl-event{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:0 12px;border-right:1px solid rgba(255,255,255,.1)}
.tl-time{color:rgba(255,255,255,.35);font-family:var(--mono);font-size:11px}
.tl-text{color:rgba(255,255,255,.75)}
.tl-sep{color:rgba(255,255,255,.2);padding:0 6px}

/* Settings overlay */
.settings-overlay{position:fixed;inset:0;background:rgba(15,15,26,.5);backdrop-filter:blur(4px);z-index:800;display:none;align-items:center;justify-content:center}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--surface);border-radius:24px;width:min(720px,92vw);max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.settings-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}

/* Wizard step 1 — grouped lender list */
.lender-group-head{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.lender-tile .ts{font-size:11px}

/* Floating "reopen deal" pill (visible when activeDeal set + panel closed) */
.deal-pill{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:600;background:var(--brand-grad);color:#fff;border:none;cursor:pointer;padding:14px 10px;border-radius:14px 0 0 14px;font-weight:700;font-size:12.5px;letter-spacing:.02em;box-shadow:var(--sh-2);max-width:200px;text-align:left;line-height:1.3;transition:filter .15s}
.deal-pill:hover{filter:brightness(1.08)}
.deal-pill .dp-arrow{margin-right:4px;opacity:.85}
.deal-pill .dp-id{display:block;font-size:10px;font-weight:600;opacity:.85;margin-top:2px}

/* Floating Policy & Rates drawer (per-file lender policy + rates) */
.pd-handle{position:fixed;top:50%;right:0;transform:translateY(-50%);z-index:651;background:var(--brand-grad);color:#fff;border:none;cursor:pointer;writing-mode:vertical-rl;padding:18px 9px;border-radius:12px 0 0 12px;font-weight:700;font-size:12px;letter-spacing:.07em;box-shadow:var(--sh-brand);transition:.15s}
.pd-handle:hover{filter:brightness(1.08)}
.pd-handle.hidden{display:none}
#policyDrawer{position:fixed;top:var(--cmdbar-h);bottom:var(--timeline-h);right:0;width:0;background:var(--surface);border-left:1px solid var(--border);box-shadow:-12px 0 40px rgba(0,0,0,.16);z-index:650;display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.22,1,.36,1)}
#policyDrawer.open{width:min(440px,96vw)}
#policyDrawer.open.wide{width:min(720px,96vw)}
.pd-head{flex-shrink:0;padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;white-space:nowrap}
.pd-title{font-size:14px;font-weight:800}
.pd-sub{font-size:11px;color:var(--t3)}
.pd-btns{margin-left:auto;display:flex;gap:6px}
.pd-icon{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center}
.pd-icon:hover{background:var(--brand-bg);color:var(--brand)}
.pd-body{flex:1;overflow-y:auto;padding:14px 16px}
.pd-ctx{font-size:12px;color:var(--t2);background:var(--bg);border-radius:10px;padding:9px 11px;margin-bottom:12px;line-height:1.6}
.pd-row-best td{background:rgba(5,150,105,.07)}
.pd-row-cur td{box-shadow:inset 3px 0 0 var(--brand)}

/* Document forensics */
.fz-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--r-pill);font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent}
.fz-chip.clear{background:rgba(5,150,105,.12);color:var(--green)}
.fz-chip.caution{background:rgba(217,119,6,.12);color:var(--amber)}
.fz-chip.review{background:rgba(220,38,38,.12);color:var(--red)}
.fz-chip.scanning{background:#EEF0F3;color:var(--t3)}
.fz-spin{width:11px;height:11px;border:2px solid #D1D5DB;border-top-color:var(--t3);border-radius:50%;animation:spin .8s linear infinite}
.fz-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.fz-dot.clear{background:var(--green)}
.fz-dot.caution{background:var(--amber)}
.fz-dot.review{background:var(--red)}
.fz-badge{display:inline-block;padding:6px 14px;border-radius:var(--r-pill);font-size:14px;font-weight:800;letter-spacing:.02em}
.fz-badge.clear{background:rgba(5,150,105,.12);color:var(--green)}
.fz-badge.caution{background:rgba(217,119,6,.12);color:var(--amber)}
.fz-badge.review{background:rgba(220,38,38,.12);color:var(--red)}
.fz-disc{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;font-size:11.5px;line-height:1.6;padding:10px 13px;border-radius:10px;margin:12px 0}
.fz-finding{border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:11px 13px;margin-bottom:9px}
.fz-finding.high{border-left-color:var(--red)}
.fz-finding.medium{border-left-color:var(--amber)}
.fz-finding.low,.fz-finding.info{border-left-color:var(--t3)}
.fz-finding .fz-fhead{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.fz-code{font-family:var(--mono);font-size:10.5px;font-weight:700;background:#0F0F1A;color:#A7F3D0;padding:1px 7px;border-radius:6px}
.fz-sev{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.fz-sev.high{color:var(--red)}.fz-sev.medium{color:var(--amber)}.fz-sev.low,.fz-sev.info{color:var(--t3)}
.fz-flayer{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin:14px 0 8px}
.fz-todo{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);border-radius:12px;padding:14px;margin:14px 0;font-size:13px;color:var(--t2);line-height:1.6}
.xck-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.xck-val{font-weight:700}.xck-src{font-size:11px;color:var(--t3)}
.xck-vs{font-size:11px;font-weight:800;color:var(--t3);text-align:center}

/* Document intelligence */
.bulk-drop{border:2px dashed #CBD2DC;border-radius:16px;padding:22px;text-align:center;cursor:pointer;color:var(--t2);transition:.15s;margin-bottom:16px;background:#FbFbFc}
.bulk-drop:hover,.bulk-drop.over{border-color:var(--brand);background:rgba(91,79,245,.04);color:var(--brand)}
.prov{cursor:pointer;color:var(--brand);font-size:11px;font-weight:700;vertical-align:super}
.prov:hover{text-decoration:underline}
.rev-split{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:900px){ .rev-split{grid-template-columns:1fr} }
.rev-docprev{min-height:320px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#0F0F1A0a,transparent);padding:24px}
.rev-field{margin-bottom:12px;padding:10px 12px;border:1px solid var(--border);border-radius:12px}
.rev-field.low{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.04)}
.rev-field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:capitalize;margin-bottom:5px}
.rev-field input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;background:#fff;font-size:13px}
.rev-field input:focus{outline:none;border-color:var(--brand)}
.rev-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.rev-meta .conf-bar{flex:0 0 70px}
.rev-src{font-size:11px;color:var(--t3);cursor:pointer;font-style:italic}
.rev-src:hover{color:var(--brand)}

.page-head{margin-bottom:20px}
.page-head h1{font-size:22px;font-weight:800}
.page-head p{color:var(--t3);margin-top:3px}

/* ---------- Shared components ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--sh-1)}
.btn{padding:9px 15px;border-radius:var(--r-btn);font-weight:700;font-size:13px;transition:.15s;border:1px solid var(--border);background:#fff;color:var(--t2)}
.btn:hover{filter:brightness(1.03);transform:translateY(-1px);box-shadow:var(--sh-1)}
.btn.primary{background:var(--brand-grad);color:#fff;border:none;box-shadow:var(--sh-brand)}
.btn.ghost{background:#F4F5F7;border-color:transparent}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:var(--r-pill);font-size:11px;font-weight:700}
.pill.green{background:rgba(5,150,105,.12);color:var(--green)}
.pill.amber{background:rgba(217,119,6,.12);color:var(--amber)}
.pill.red{background:rgba(220,38,38,.12);color:var(--red)}
.pill.violet{background:rgba(91,79,245,.12);color:var(--brand)}
.pill.gray{background:#EEF0F3;color:var(--t3)}
.progress{height:7px;border-radius:6px;background:#EEF0F3;overflow:hidden}
.progress>span{display:block;height:100%;background:var(--brand-grad);border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:18px;box-shadow:var(--sh-1);border-top:3px solid var(--brand);transition:.18s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.kpi .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.kpi .num{font-size:26px;font-weight:800}
.kpi .cap{color:var(--t3);font-size:12.5px;font-weight:600;margin-top:2px}

/* Deal grid */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:var(--r-input);background:#fff}
.search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px rgba(91,79,245,.1)}
.search .si-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3)}
.filters{display:flex;gap:6px}
.chip{padding:8px 14px;border-radius:var(--r-pill);font-weight:600;font-size:12.5px;border:1px solid var(--border);background:#fff;color:var(--t2);transition:.13s}
.chip:hover{border-color:var(--brand)}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.deal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:16px}
.deal-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-card);padding:18px;cursor:pointer;transition:.18s;box-shadow:var(--sh-1)}
.deal-card:hover{border-color:var(--brand);box-shadow:var(--sh-2);transform:translateY(-2px)}
.deal-card .dc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.deal-card .dc-name{font-weight:700;font-size:15px}
.deal-card .dc-id{color:var(--t3);font-size:12px;margin-bottom:12px}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.metric-box{background:#F4F5F7;border-radius:11px;padding:9px 10px}
.metric-box .mb-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.metric-box .mb-val{font-weight:700;font-size:13.5px;margin-top:2px}
.ai-bar{margin-top:12px}
.ai-bar .lbl{font-size:11px;color:var(--brand);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between}

/* Slide-over panel */
.overlay{position:fixed;inset:0;background:rgba(15,15,26,.4);z-index:900;display:none}
.overlay.show{display:block}
.panel{
  position:fixed;top:0;right:0;height:100%;width:440px;max-width:92vw;background:var(--surface);
  z-index:901;box-shadow:-10px 0 40px rgba(0,0,0,.18);transform:translateX(100%);
  transition:transform .28s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
}
.panel.show{transform:translateX(0)}
.panel-head{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.panel-body{flex:1;overflow-y:auto;padding:22px}
.panel-x{font-size:22px;color:var(--t3);line-height:1;background:none}
.detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.detail-row .dl{color:var(--t3);font-weight:600}
.detail-row .dv{font-weight:700}

/* ============================================================
   WIZARD
   ============================================================ */
.wiz-head{background:var(--brand-grad);color:#fff;border-radius:var(--r-card);padding:24px;margin-bottom:20px}
.wiz-head h1{font-size:22px;font-weight:800}
.wiz-head p{opacity:.85;margin-top:3px}
.wiz-steps{display:flex;gap:6px;margin-top:18px;flex-wrap:wrap}
.wiz-step{flex:1;min-width:90px;text-align:center}
.wiz-step .bar{height:5px;border-radius:5px;background:rgba(255,255,255,.3);transition:.4s}
.wiz-step.done .bar,.wiz-step.cur .bar{background:#fff}
.wiz-step .nm{font-size:11px;margin-top:6px;opacity:.8;font-weight:600}
.wiz-step.cur .nm{opacity:1}
.wiz-card{background:var(--surface);border:2px solid var(--border);border-radius:28px;padding:28px;box-shadow:var(--sh-1)}
.wiz-card.active{border-color:var(--brand)}
.wiz-card h3{font-size:18px;font-weight:700;margin-bottom:4px}
.wiz-card .desc{color:var(--t3);margin-bottom:20px}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.tile{border:1.5px solid var(--border);border-radius:var(--r-input);padding:16px;text-align:center;cursor:pointer;transition:.15s;font-weight:600}
.tile:hover{border-color:var(--brand)}
.tile.sel{border-color:var(--brand);background:rgba(91,79,245,.06)}
.tile .tt{font-size:14px}
.tile .ts{font-size:11px;color:var(--t3);font-weight:500;margin-top:3px}
.wiz-nav{display:flex;justify-content:space-between;margin-top:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.inp{display:flex;flex-direction:column;gap:6px}
.inp label{font-size:12px;font-weight:600;color:var(--t2)}
.inp input,.inp select,.inp textarea{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-input);background:#FbFbFc;transition:.15s}
.inp input:focus,.inp select:focus,.inp textarea:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(91,79,245,.1)}
.upload-zone{border:2px dashed #CBD2DC;border-radius:var(--r-input);padding:22px;text-align:center;cursor:pointer;transition:.18s;color:var(--t3);font-weight:600}
.upload-zone:hover{border-color:var(--brand);color:var(--brand)}
.upload-zone.done{border-style:solid;border-color:var(--green);background:rgba(5,150,105,.06);color:var(--green)}
.lvr-badge{padding:16px;border-radius:var(--r-input);text-align:center;font-weight:800;font-size:24px;margin-top:14px}

/* ============================================================
   SERVICEABILITY CALCULATOR
   ============================================================ */
.calc-split{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
.calc-results{position:sticky;top:0}
.entity-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);margin-bottom:14px;box-shadow:var(--sh-1)}
.entity-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.entity-head h4{font-size:15px;font-weight:700}
.entity-body{padding:0 16px 16px}
.row-line{display:grid;grid-template-columns:1.15fr .85fr .85fr .42fr .9fr 26px;gap:7px;align-items:center;margin-bottom:7px}
.row-line.liab{grid-template-columns:1.1fr .9fr .6fr .6fr .9fr 30px}
.addback-row{background:rgba(91,79,245,.04);border-left:3px solid var(--brand);border-radius:0 0 8px 8px;padding:8px 10px;font-size:12px;margin:-3px 0 9px}
.addback-row .ab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px 12px}
.addback-row label{display:flex;flex-direction:column;gap:3px;color:var(--t2);font-weight:600}
.addback-row input{padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:12px}
.addback-row .ab-net{margin-top:8px;font-weight:700;color:var(--brand)}
.avg-toggle{display:flex;align-items:center;justify-content:center}
.row-line input,.row-line select{padding:8px 9px;border:1px solid var(--border);border-radius:9px;background:#FbFbFc;font-size:12.5px;width:100%}
.row-line input:focus,.row-line select:focus{outline:none;border-color:var(--brand);background:#fff}
.row-line .computed{font-weight:700;font-size:12.5px;color:var(--t2);text-align:right}
.row-x{color:var(--t3);font-size:16px;text-align:center}
.row-head{display:grid;grid-template-columns:1.15fr .85fr .85fr .42fr .9fr 26px;gap:7px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding:0 2px}
.row-head.liab{grid-template-columns:1.1fr .9fr .6fr .6fr .9fr 30px}
.add-row{margin-top:6px;font-size:12px;color:var(--brand);font-weight:700;background:none}
.subsec{font-size:12px;font-weight:700;color:var(--t2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.slider-row{margin-bottom:14px}
.slider-row label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:7px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:5px;background:#E5E8EE}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);box-shadow:var(--sh-brand);cursor:pointer}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:var(--brand);box-shadow:var(--sh-brand);cursor:pointer}
.assessed-note{background:rgba(217,119,6,.08);color:var(--amber);border-radius:11px;padding:10px 13px;font-weight:600;font-size:12.5px;margin-top:10px}

/* Results panel */
.verdict{border-radius:var(--r-card);padding:22px;text-align:center;color:#fff;margin-bottom:16px}
.verdict.pass{background:linear-gradient(135deg,#059669,#10B981)}
.verdict.borderline{background:linear-gradient(135deg,#D97706,#F59E0B)}
.verdict.fail{background:linear-gradient(135deg,#DC2626,#EF4444)}
.verdict .v-lbl{font-size:12px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.6px}
.verdict .v-big{font-size:30px;font-weight:800;margin-top:4px}
.verdict .v-sub{font-size:12.5px;opacity:.9;margin-top:4px}
.res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;text-align:center}
.res-box .rl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.res-box .rv{font-size:18px;font-weight:800;margin-top:3px}
.flow-chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px}
.flow-chart h4,.stress-table h4{font-size:13px;font-weight:700;margin-bottom:12px}
.flow-row{margin-bottom:10px}
.flow-row .fl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.flow-bar{height:9px;border-radius:6px;background:#EEF0F3;overflow:hidden}
.flow-bar>span{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.stress-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--t3);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:7px 6px;border-bottom:1px solid var(--border)}
td{padding:9px 6px;border-bottom:1px solid var(--border);font-weight:500}
tr:last-child td{border-bottom:none}

/* ============================================================
   COMMENTARY
   ============================================================ */
.commentary-wrap{max-width:820px;margin:0 auto}
.comm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:20px;margin-bottom:14px;box-shadow:var(--sh-1)}
.comm-card.broker{border-left:4px solid var(--amber)}
.comm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.comm-head h4{font-size:15px;font-weight:700}
.comm-text{color:var(--t2);line-height:1.65;white-space:pre-wrap}
.comm-card textarea{width:100%;min-height:110px;padding:12px;border:1.5px solid var(--brand);border-radius:12px;line-height:1.6;resize:vertical}
.mini-btn{padding:5px 11px;border-radius:9px;font-size:11.5px;font-weight:700;border:1px solid var(--border);background:#fff;color:var(--t2);transition:.13s}
.mini-btn:hover{border-color:var(--brand);color:var(--brand)}

/* ============================================================
   GENERIC TABLE PAGE
   ============================================================ */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:6px 20px 14px;box-shadow:var(--sh-1);overflow-x:auto}
.conf-bar{width:80px;height:7px;border-radius:5px;background:#EEF0F3;overflow:hidden;display:inline-block;vertical-align:middle}
.conf-bar>span{display:block;height:100%;background:var(--brand-grad)}

/* Lender compare */
.best-row td{background:rgba(5,150,105,.07)}

/* Client portal */
.portal-split{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
.phone{width:280px;height:560px;background:#0F0F1A;border-radius:38px;padding:12px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.phone-screen{width:100%;height:100%;background:#F4F5F7;border-radius:28px;overflow:hidden;display:flex;flex-direction:column}
.phone-top{background:var(--brand-grad);color:#fff;padding:22px 18px}
.phone-top h4{font-size:16px;font-weight:700}
.phone-body{padding:16px;flex:1;overflow-y:auto}
.dz{border:2px dashed #CBD2DC;border-radius:14px;padding:16px;text-align:center;margin-bottom:11px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:.18s}
.dz.done{border-style:solid;border-color:var(--green);background:rgba(5,150,105,.07);color:var(--green)}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.switch{width:42px;height:24px;border-radius:14px;background:#D1D5DB;position:relative;cursor:pointer;transition:.18s;flex-shrink:0}
.switch.on{background:var(--brand)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s}
.switch.on::after{left:21px}

/* Global markets */
.market-hero{background:var(--brand-grad);color:#fff;border-radius:var(--r-card);padding:26px;margin-bottom:20px}
.market-hero h2{font-size:22px;font-weight:800}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
.hero-stat{background:rgba(255,255,255,.13);border-radius:14px;padding:14px}
.hero-stat .hn{font-size:22px;font-weight:800}
.hero-stat .hl{font-size:12px;opacity:.85}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.market-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-card);padding:18px;cursor:pointer;transition:.18s;box-shadow:var(--sh-1)}
.market-card:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.market-card.active{border-color:var(--brand);background:rgba(91,79,245,.04)}
.market-card .mc-flag{font-size:28px}
.market-card .mc-name{font-weight:700;font-size:15px;margin-top:6px}

/* Billing */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.plan{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-card);padding:22px;box-shadow:var(--sh-1)}
.plan.active{background:var(--brand-grad);color:#fff;border:none;box-shadow:var(--sh-brand)}
.plan .price{font-size:30px;font-weight:800;margin:10px 0}
.plan .price small{font-size:14px;font-weight:600;opacity:.7}
.plan ul{list-style:none;margin:16px 0;font-size:13px}
.plan ul li{padding:6px 0;display:flex;gap:8px;align-items:center}
.usage-bar{height:8px;border-radius:6px;background:#EEF0F3;overflow:hidden;margin-top:10px}
.usage-bar>span{display:block;height:100%;background:var(--brand-grad);border-radius:6px}

/* Settings */
.tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:11px 16px;font-weight:700;font-size:13.5px;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;transition:.13s}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:fadeUp .3s ease}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.check-item{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-weight:600;font-size:13px}
.check-item input{width:17px;height:17px;accent-color:var(--brand)}

/* Dropdown */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh-2);padding:6px;z-index:50;min-width:190px;display:none}
.dropdown.show{display:block;animation:fadeUp .15s ease}
.dd-item{padding:9px 12px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px;display:flex;align-items:center;gap:9px}
.dd-item:hover{background:#F4F5F7}

/* Toast */
#toasts{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:10px}
.toast{background:#0F0F1A;color:#fff;padding:13px 17px;border-radius:13px;font-weight:600;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);animation:slideUp .25s ease;display:flex;align-items:center;gap:10px;max-width:340px}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}
.toast.info{border-left:4px solid var(--brand)}

/* Loading modal */
#loader{position:fixed;inset:0;background:rgba(15,15,26,.55);z-index:1500;display:none;align-items:center;justify-content:center}
#loader.show{display:flex}
.loader-card{background:#fff;border-radius:24px;padding:34px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.spinner{width:46px;height:46px;border:4px solid #EEF0F3;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.loader-card p{font-weight:700;color:var(--t2)}

/* AI Pilot */
.pilot-step{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:var(--sh-1);transition:.2s}
.pilot-step.running{border-color:var(--brand);box-shadow:var(--sh-brand)}
.pilot-step.done{border-color:var(--green)}
.pilot-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;background:#EEF0F3;color:var(--t3)}
.pilot-step.running .pilot-ico{background:rgba(91,79,245,.12);color:var(--brand)}
.pilot-step.done .pilot-ico{background:rgba(5,150,105,.12);color:var(--green)}
.pilot-step .pt{font-weight:700;font-size:14px}
.pilot-step .pd{font-size:12px;color:var(--t3)}
.pilot-spin{width:18px;height:18px;border:2px solid #EEF0F3;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
.insight-row{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}

/* Subtle motion — radial gauges, shimmer */
@keyframes shimmer{0%{background-position:-360px 0}100%{background-position:360px 0}}
.gauge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.gauge{width:100%;max-width:104px;height:104px;margin:0 auto;display:block}
.g-track{fill:none;stroke:#EEF0F3;stroke-width:7}
.g-arc{fill:none;stroke-width:7;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .85s cubic-bezier(.22,1,.36,1)}
.gauge text.g-val{font-family:'DM Mono',monospace;font-weight:500;font-size:15px;text-anchor:middle;fill:var(--t1)}
.gauge text.g-lbl{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:7.5px;letter-spacing:.6px;text-anchor:middle;fill:var(--t3)}
.gauge-cell{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:8px 4px}
.skeleton{background:linear-gradient(90deg,#EEF0F3 25%,#F7F8FA 50%,#EEF0F3 75%);background-size:720px 100%;animation:shimmer 1.4s infinite linear;border-radius:8px}

<script>
/* ============================================================
   DEBTIQ v6 — Application Logic
   ============================================================ */
const TODAY = new Date();
const TODAY_STR = TODAY.toISOString().slice(0,10);
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
const debouncedRenderDealGrid = debounce(()=>renderDealGrid(), 150);

/* ---------- Markets (AU fully wired; NZ database arrives Q3) ---------- */
const MARKETS = {
  AU:{code:'AU',label:'Australia',flag:'🇦🇺',cur:'AUD',sym:'$',buffer:0.03,dsrMax:45,hem:2200,
      lenders:['CBA','ANZ','NAB','Westpac','Macquarie','ING','Suncorp','St George','Pepper','Liberty']},
  NZ:{code:'NZ',label:'New Zealand',flag:'🇳🇿',cur:'NZD',sym:'$',buffer:0.03,dsrMax:40,hem:1900,
      lenders:['ANZ NZ','ASB','BNZ','Westpac NZ','Kiwibank','SBS Bank','TSB','Co-op Bank','Pepper NZ','Resimac']}
};

/* ---------- Income shading multipliers ---------- */
const SHADE = {
  salary_ft:1.00, salary_pt:1.00, self_emp:1.00, freelance:0.90, overtime:0.80, bonus:0.80, commission:0.80,
  rental_res:0.80, rental_com:0.75, dividends:0.75, trust_dist:0.80,
  pension:1.00, family:1.00, foreign:0.80, boarder:0.60, interest:1.00
};
const INCOME_TYPES = {
  salary_ft:'Salary (Full-time)', salary_pt:'Salary (Part-time)', self_emp:'Self-employed',
  freelance:'Freelance', overtime:'Overtime', bonus:'Bonus', commission:'Commission',
  rental_res:'Rental (Residential)', rental_com:'Rental (Commercial)', dividends:'Dividends',
  trust_dist:'Trust Distribution', pension:'Pension', family:'Family Payments',
  foreign:'Foreign Income', boarder:'Boarder Income', interest:'Interest Income'
};
// Income types that get conditional-shading toggles in the calculator.
const CONDITIONAL_INCOME = ['overtime','bonus','self_emp'];
const LIAB_TYPES = {
  mortgage:'Mortgage', personal:'Personal Loan', car:'Car Loan',
  credit_card:'Credit Card', hecs:'HECS/Student', bnpl:'BNPL', other:'Other'
};

/* ---------- Finance engine ---------- */
function PMT(principal, annualRate, years){
  const r = annualRate/12, n = years*12;
  if(principal<=0) return 0;
  if(r===0) return principal/n;
  return (principal*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
// Type-specific default loan terms — never default to 25y except a mortgage.
const DEFAULT_TERM = { mortgage:25, personal:5, car:5, bnpl:1, other:5 };
function defaultTerm(type){ return DEFAULT_TERM[type] || 5; }
function assessLiability(l, buffer){
  const bal = parseFloat(l.balance)||0;
  const rate = (parseFloat(l.rate)||0)/100;
  const term = parseFloat(l.term)||0;
  switch(l.type){
    case 'credit_card': return bal*0.038/12;                 // limit * 3.8% / 12
    case 'hecs':        return bal*0.01/12;                   // balance * 1% / 12
    default:            return PMT(bal, rate+buffer, term>0 ? term : defaultTerm(l.type));
  }
}
/* HEM lookup approximating the Melbourne Institute table — by income band × household. */
function getHEM(grossAnnualHousehold, adults, dependants){
  const bands = [
    { max:  60000, single:1850, couple_no_kids:2800, couple_1:3450, couple_2:4050, couple_3plus:4600 },
    { max:  90000, single:2050, couple_no_kids:3100, couple_1:3800, couple_2:4450, couple_3plus:5050 },
    { max: 140000, single:2350, couple_no_kids:3500, couple_1:4200, couple_2:4900, couple_3plus:5550 },
    { max: 200000, single:2750, couple_no_kids:4050, couple_1:4750, couple_2:5500, couple_3plus:6200 },
    { max: Infinity, single:3250, couple_no_kids:4700, couple_1:5400, couple_2:6200, couple_3plus:6950 }
  ];
  const band = bands.find(b => grossAnnualHousehold <= b.max);
  const col = (adults<=1) ? 'single'
            : dependants===0 ? 'couple_no_kids'
            : dependants===1 ? 'couple_1'
            : dependants===2 ? 'couple_2' : 'couple_3plus';
  return band[col];
}

const lenderDB = ()=> (typeof window!=='undefined' && window.LENDERS) || (typeof LENDERS!=='undefined' ? LENDERS : {});
function activePolicy(id){
  const lid = id || state.lender;
  if(state.market!=='AU') return null;
  return lenderDB()[lid] || null;
}
function activeBuffer(id){ const p=activePolicy(id); return p ? p.buffer : m().buffer; }
function activeDsrMax(id){ const p=activePolicy(id); return p ? p.dsr_max : m().dsrMax; }
// Lender-aware, conditional income shading. Accepts the income object so it can
// read evidence_years / emergency-services / healthcare flags.
function getShadedIncome(inc, id){
  const type = inc.type, p = activePolicy(id);
  // Two-year capture: optionally assess on the 2-year average.
  const annual = (inc.use_average && inc.amount_y2)
    ? ((parseFloat(inc.amount_y1)||0) + (parseFloat(inc.amount_y2)||0)) / 2
    : (parseFloat(inc.amount)||0);
  // Self-employed add-backs (depreciation/interest/lease) less business loan repayments.
  const addbacks = type==='self_emp'
    ? (parseFloat(inc.addback_depreciation)||0) + (parseFloat(inc.addback_interest)||0) + (parseFloat(inc.addback_lease)||0)
    : 0;
  const base = type==='self_emp'
    ? (annual + addbacks - (parseFloat(inc.business_loan_repayments)||0))
    : annual;
  let shade;
  if(p && p.income_shading){
    const key = (type==='family' && p.income_shading.family===undefined) ? 'family_ben' : type;
    shade = p.income_shading[key];
  }
  if(typeof shade!=='number') shade = (SHADE[type]!==undefined ? SHADE[type] : 1.00);
  const ev = inc.evidence_years || 2;
  if(type==='overtime' && (inc.is_emergency_services||inc.is_healthcare) && p && /Westpac/i.test(p.label||'')) shade = 1.00;
  if(type==='bonus' && ev<2) shade = 0.00;                 // bonus needs 2yr history
  if(type==='self_emp' && ev<2) shade = Math.min(shade, 0.50); // 1yr self-emp = conservative
  return Math.max(0, base) * shade;
}
// Lender HECS rule. Uses the explicit monthly_deduction from the payslip where present.
// 'exclude_under_20k' (NAB) · 'exclude_if_12mo' (CBA: balance repayable within 12 months).
// Returns the monthly HECS amount to drop from commitments (0 = include in full).
function hecsExclusion(liab, income, id){
  const p = activePolicy(id);
  const rule = p && p.income_shading && p.income_shading.hecs;
  const bal = parseFloat(liab.balance)||0;
  const monthlyDed = parseFloat(liab.monthly_deduction)||0;
  if(rule==='exclude_under_20k' && bal < 20000) return bal*0.01/12;
  if(rule==='exclude_if_12mo'){
    const annualRepay = monthlyDed>0 ? monthlyDed*12 : (income*12)*0.07;  // payslip figure, else estimate
    if(annualRepay >= bal) return bal*0.01/12;
  }
  return 0;
}

/* ============================================================
   SERVICEABILITY COMPUTATION
   ============================================================ */
function computeServiceability(){
  const buffer = activeBuffer(), mk = m(), dsrMax = activeDsrMax();
  let shadedAnnual = 0, totalLiab = 0, existingDebt = 0;
  const breakdown = {};
  // Each entity contributes weighted by entityWeight (skips excluded; applies ownership %).
  state.calc.entities.forEach(ent=>{
    const w=entityWeight(ent); if(!w) return;
    ent.incomes.forEach(inc=>{
      const shaded = getShadedIncome(inc, state.lender) * w;
      shadedAnnual += shaded;
      breakdown[inc.type] = (breakdown[inc.type]||0) + shaded;
    });
  });
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=>{
    if(!entityWeight(ent)) return;
    ent.liabilities.forEach(l=>{
      let assessed = assessLiability(l, buffer);
      if(l.type==='hecs') assessed -= hecsExclusion(l, income);  // lender HECS rule
      existingDebt += Math.max(0, assessed);
      // Credit-card LIMIT is not outstanding debt — exclude from the DTI balance sum.
    if(l.type!=='credit_card') totalLiab += parseFloat(l.balance)||0;
    });
  });
  const nl = state.calc.newLoan;
  const newLoanMo = PMT(parseFloat(nl.amount)||0, ((parseFloat(nl.rate)||0)+buffer*100)/100, parseFloat(nl.term)||30);
  const totalDebt = existingDebt + newLoanMo;
  const HEM = getHEM(shadedAnnual, state.calc.adults||1, state.calc.dependants);
  const ndi = income - totalDebt - HEM;
  const dsr = income>0 ? totalDebt/income*100 : 0;
  // LVR uses aggregate security value (sum of securities[].value, fallback to wizData.propValue).
  // No fake fallback to amount/0.8 — if no security value is set, lvr stays 0 and the UI shows '—'.
  const propValue = totalSecurityValue();
  const lvr = propValue>0 ? (parseFloat(nl.amount)||0)/propValue*100 : 0;
  // DTI: total debt balance (existing + new loan) vs gross shaded annual income (APRA 2026 cap).
  const dti = shadedAnnual>0 ? (totalLiab + (parseFloat(nl.amount)||0))/shadedAnnual : 0;

  let verdict;
  const pass = ndi>0 && dsr<dsrMax;
  if(pass) verdict='PASS';
  else if(ndi > -250 && dsr < dsrMax+5) verdict='BORDERLINE';
  else verdict='FAIL';

  return {income, shadedAnnual, existingDebt, newLoanMo, totalDebt, HEM, ndi, dsr, lvr, dti, totalLiab, verdict, breakdown, propValue, lvrAvailable: propValue>0, assessedRate:(parseFloat(nl.rate)||0)+buffer*100};
}

    if(state.dealSearch && !(d.name.toLowerCase().includes(state.dealSearch.toLowerCase())||d.id.toLowerCase().includes(state.dealSearch.toLowerCase()))) return false;
    if(state.dealFilter==='my' && d.status!=='BROKER_REVIEW') return false;
    if(state.dealFilter==='docs' && d.status!=='DOCS_PENDING') return false;
    if(state.dealFilter==='approved' && d.status!=='APPROVED') return false;
    return true;
  });
}

/* ---------- Real OCR via the /api/extract vision function ---------- */
function fileToB64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(String(r.result).split(',')[1]||'');
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
// Render PDF pages to PNG (base64) client-side via pdf.js — fallback for accounts
// where direct PDF upload to the model isn't available.
async function pdfToImages(file, maxPages=3){
  const lib = window.pdfjsLib; if(!lib) throw new Error('pdf.js unavailable');
  if(!lib.GlobalWorkerOptions.workerSrc) lib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';
  const buf = await file.arrayBuffer();
  const pdf = await lib.getDocument({data:buf}).promise;
  const out = [], pages = Math.min(maxPages, pdf.numPages);
  for(let p=1;p<=pages;p++){
    const page = await pdf.getPage(p);
    const vp = page.getViewport({scale:1.6});
    const cv = document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext('2d'), viewport:vp}).promise;
    out.push({ media_type:'image/png', data: cv.toDataURL('image/png').split(',')[1]||'' });
  }
  return out;
}
// One file → one-or-more Anthropic content payload parts (PDFs rasterised when possible).
async function fileToPayload(file){
  const img = ['image/png','image/jpeg','image/webp','image/gif'];
  if(img.includes(file.type)) return [{ media_type:file.type, data: await fileToB64(file) }];
  if(file.type==='application/pdf'){
    if(window.pdfjsLib){ try{ const imgs = await pdfToImages(file, 3); if(imgs.length) return imgs; }catch(e){} }
    return [{ media_type:'application/pdf', data: await fileToB64(file) }];   // raw PDF fallback
  }
  return [];
}
async function buildExtractPayload(files){
  const out = [];
  for(const f of files){ for(const part of await fileToPayload(f)){ if(out.length<6) out.push(part); } }
  return out;
}
async function callExtract(payload){
  let token=''; try{ const { data } = await sbClient.auth.getSession(); token = data && data.session && data.session.access_token; }catch(e){}
  const res = await fetch('/api/extract', { method:'POST', headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) }, body: JSON.stringify({ files: payload }) });
  return { ok:res.ok, json: await res.json() };
}
async function extractFiles(files, entityIdx=0){
  if(!aiLive()) return;
  showLoader('Reading document(s)…');
  let payload;
  try{ payload = await buildExtractPayload([...files]); }catch(e){ hideLoader(); toast('Could not read files', 'err'); return; }
  if(!payload.length){ hideLoader(); toast('Upload PNG/JPEG/PDF for AI extraction', 'info'); return; }
  try{
    const { ok, json } = await callExtract(payload);
    hideLoader();
    if(!ok){ toast('Extraction: '+(json.error||'failed'), 'err'); return; }
    const n = mergeExtracted(json.extracted, entityIdx);
    toast(n ? ('Extracted '+n+' line(s) into the calculator') : 'No data found in those documents', n?'ok':'info');
    if(state.activeDeal) renderPanel();
  }catch(e){ hideLoader(); toast('Extraction failed', 'err'); }
}
// Standalone tester — shows the raw JSON the model returns (Compliance page).
async function testExtract(files){
  if(!files || !files.length) return;
  const out = document.getElementById('ocrTestOut');
  if(!aiLive()){ if(out) out.textContent = 'Demo mode — deploy the backend and sign in to run real extraction. (Files are read locally; nothing is sent.)'; toast('Backend required for live extraction','info'); return; }
  showLoader('Extracting…');
  try{
    const payload = await buildExtractPayload([...files]);
    if(!payload.length){ hideLoader(); if(out) out.textContent='No supported files (PNG/JPEG/PDF).'; return; }
    const { ok, json } = await callExtract(payload);
    hideLoader();
    if(out) out.textContent = ok ? JSON.stringify(json.extracted||json, null, 2) : ('Error: '+(json.error||'failed'));
  }catch(e){ hideLoader(); if(out) out.textContent='Extraction failed.'; }
}
// Validate against the app's type codes and push extracted lines into an entity.
function mergeExtracted(ex, entityIdx=0){
  if(!ex) return 0;
  const idx = entityIdx||0;
  if(!state.calc.entities[idx]) state.calc.entities[idx] = {name:'Applicant '+(idx+1), open:true, incomes:[], liabilities:[]};
  const ent = state.calc.entities[idx];
  if(ex.applicant_name && /Applicant/.test(ent.name)) ent.name = ex.applicant_name;
  let n=0;
  (ex.incomes||[]).forEach(i=>{
    if(!INCOME_TYPES[i.type]) return;
    const y1 = parseFloat(i.amount_y1)||0;
    ent.incomes.push({ type:i.type, amount:y1, amount_y1:y1, amount_y2:parseFloat(i.amount_y2)||0, use_average:false, evidence_years:2 });
    n++;
  });
  (ex.liabilities||[]).forEach(l=>{
    if(!LIAB_TYPES[l.type]) return;
    ent.liabilities.push({ type:l.type, balance:parseFloat(l.balance)||0, rate:parseFloat(l.rate)||0, term:parseFloat(l.term)||0 });
    n++;
  });
  if(state.page==='serviceability') updateStatusStrip();
  return n;
}

function advanceDeal(id){
  const d = DEALS.find(x=>x.id===id);
  if(!d) return;
  const order = ['DOCS_PENDING','AI_PROCESSING','BROKER_REVIEW','SUBMITTED','APPROVED'];
  let i = order.indexOf(d.status);
  if(i === -1){ toast('This deal’s status can’t be auto-advanced','info'); return; }
  d.status = order[Math.min(i+1, order.length-1)];
  if(d.status==='APPROVED'){ d.progress=null; d.closed=TODAY_STR; }
  (d.activity = d.activity||[]).push({at:TODAY_STR, text:'Advanced to '+STATUS_META[d.status].label});
  saveDeal(d);   // persist when signed in
  toast(`${d.id} advanced to ${STATUS_META[d.status].label}`, 'ok');
  logEvent(`${d.id} advanced to ${STATUS_META[d.status].label}`);
  updateDealStrip(); updateCopilot();
  if(state.activeDeal===id && document.getElementById('panel') && document.getElementById('panel').classList.contains('show')) renderPanel();
  const pg = document.getElementById('page-dashboard');
  if(pg){ renderDashboard(pg); const si=document.getElementById('dealSearch'); if(si){ si.value=state.dealSearch; renderDealGrid(); } }
  const cl = document.getElementById('page-client');
  if(cl) renderClientTab(cl);
}

// Checklist generator — selected lender's required docs, extended by deal type.
function lenderChecklist(id, dealType){
  const p = activePolicy(id);
  if(!p) return ['Payslips (last 2)','Bank Statements','ID Verification','Tax Returns','Liability Statements'];
  let docs = [...(p.checklist_standard||[])];
  if((dealType==='Commercial' || dealType==='SMSF') && p.checklist_self_employed) docs = docs.concat(p.checklist_self_employed);
  if(dealType==='Investment' && p.checklist_investment) docs = docs.concat(p.checklist_investment);
  return docs;
}

function wizUpload(i, name, entityIdx=0){
  const z = document.getElementById('wizUp'+i); if(!z || z.classList.contains('done')) return;
  z.innerHTML = '⟳ Reading '+name+'…';
  setTimeout(()=>{
    z.classList.add('done'); z.innerHTML = '✓ '+name+' — extracted';
    DOCS.unshift({name:name.replace(/[^a-z0-9]+/gi,'_')+'.pdf', deal:'NEW', type:name, conf:96, status:'Verified', size:'—', date:TODAY_STR});
    logEvent('Document uploaded: '+name);
    wizExtract(name, entityIdx);
  }, 1100);
}
// Simulated OCR extraction into the shared calc state — varies by document keyword + entity.
function wizExtract(name, entityIdx=0){
  const idx = entityIdx || 0;
  if(!state.calc.entities[idx]){
    state.calc.entities[idx] = {name:'Applicant '+(idx+1), open:true, incomes:[], liabilities:[]};
  }
  const ent = state.calc.entities[idx];
  const n = name.toLowerCase(); let added='';
  if(/payslip/.test(n) && !ent.incomes.some(x=>x._payslip)){ ent.incomes.push({type:'salary_ft', amount:142000, amount_y1:142000, amount_y2:138000, use_average:false, evidence_years:2, _payslip:true}); added='salary'; }
  else if(/tax/.test(n) && !ent.incomes.some(x=>x._tax)){ ent.incomes.push({type:'self_emp', amount:90000, amount_y1:90000, amount_y2:84000, use_average:false, evidence_years:2, _tax:true}); added='self-employed income'; }
  else if(/(liabilit|statement)/.test(n) && !ent.liabilities.some(x=>x._stmt)){ ent.liabilities.push({type:'credit_card', balance:15000, rate:21.9, term:0, _stmt:true}); added='a credit-card liability'; }
  if(added) toast('Extracted '+added+' into the calculator', 'ok');
  if(state.page==='serviceability') updateStatusStrip();
}
function submitDeal(){
  showLoader('Submitting deal to lender…');
  setTimeout(()=>{
    hideLoader();
    // Monotonic, collision-free id based on the highest existing D-number
    const maxNum = DEALS.reduce((mx,d)=>{ const n=parseInt((d.id||'').replace(/\D/g,''),10); return isNaN(n)?mx:Math.max(mx,n); }, 891);
    const id = 'D-'+(maxNum+1);
    const amt = parseFloat(state.calc.newLoan.amount)||0, pv = totalSecurityValue()||1;
    const wd = state.wizData;
    const borrowerName = [wd.firstName, wd.lastName].filter(Boolean).join(' ').trim()
      || (state.calc.entities[0] && state.calc.entities[0].name) || 'New Application';
    const newDeal = mkDeal({id, name:borrowerName, lender:wd.lender||'CBA', amount:amt, status:'SUBMITTED', lvr:+(amt/pv*100).toFixed(1), progress:null, type:wd.dealType||'Owner Occupier', primary_email:wd.email||'', primary_phone:wd.phone||''});
    persistDealIntel(id);  // persist entities + securities + provenance onto the new deal
    DEALS.unshift(newDeal);
    DOCS.forEach(x=>{ if(x.deal==='NEW') x.deal=id; });   // retag wizard docs to the new deal
    saveDeal(newDeal);                                    // persist when signed in
    toast(`Deal ${id} submitted successfully!`, 'ok');
    logEvent(`Deal ${id} submitted to ${lenderLabel(newDeal.lender)}`);
    state.wizStep=1; closeWizardModal(); setActiveDeal(id);
  }, 1600);
}

/* In-place update on keystroke/drag — never re-renders inputs, so focus and slider drag are preserved */
function updateCalc(){
  const buffer = activeBuffer();
  state.calc.entities.forEach((ent,ei)=>{
    ent.incomes.forEach((inc,ii)=>{
      const shadedAmt = getShadedIncome(inc, state.lender);
      // Show the TRUE shade factor (post add-backs the ratio against raw is misleading for self-emp).
      // Recompute the pre-shade assessable base the same way getShadedIncome does:
      const annualBase = (inc.use_average && inc.amount_y2)
        ? (((+inc.amount_y1||0)+(+inc.amount_y2||0))/2)
        : (parseFloat(inc.amount)||0);
      const assessableBase = inc.type==='self_emp'
        ? Math.max(0, annualBase + (+inc.addback_depreciation||0) + (+inc.addback_interest||0) + (+inc.addback_lease||0) - (+inc.business_loan_repayments||0))
        : annualBase;
      const sh = assessableBase > 0 ? shadedAmt / assessableBase : (SHADE[inc.type]||1);
      setText(`incShade-${ei}-${ii}`, '×'+sh.toFixed(2));
      setText(`incShaded-${ei}-${ii}`, fmtMoney(shadedAmt));
      if(inc.type==='self_emp'){
        const ann = (inc.use_average && inc.amount_y2) ? (((+inc.amount_y1||0)+(+inc.amount_y2||0))/2) : (parseFloat(inc.amount)||0);
        const net = Math.max(0, ann+(+inc.addback_depreciation||0)+(+inc.addback_interest||0)+(+inc.addback_lease||0)-(+inc.business_loan_repayments||0));
        setText(`abNet-${ei}-${ii}`, 'Net assessable (pre-shade): '+fmtMoney(net));
      }
    });
    ent.liabilities.forEach((l,li)=> setText(`liabAss-${ei}-${li}`, fmtMoney(assessLiability(l, buffer))));
  });
  const nl = state.calc.newLoan;
  const pol = activePolicy();
  setText('nlRateLbl', (+nl.rate||0).toFixed(2)+'%');
  setText('nlTermLbl', nl.term+' yrs');
  setText('nlDepLbl', state.calc.dependants);
  setText('nlAssessed', `Assessed rate: ${((+nl.rate||0)+buffer*100).toFixed(2)}% (contract ${(+nl.rate||0).toFixed(2)}% + ${(buffer*100).toFixed(0)}% ${pol?(pol.label+' '):''}buffer)`);
  renderCalcResults();
  updateStatusStrip();
}

/* ---------- Subtle motion helpers ---------- */
function animateCount(el, to, opts){
  if(!el) return; opts = opts||{};
  const dur = opts.dur||750, money = opts.money, t0 = performance.now(), from = 0;
  const fmt = v => money ? fmtMoney(v) : Math.round(v).toLocaleString();
  (function tick(t){
    const p = Math.min(1, (t-t0)/dur), e = 1-Math.pow(1-p,3);   // easeOutCubic
    el.textContent = fmt(from + (to-from)*e);
    if(p<1) requestAnimationFrame(tick); else el.textContent = fmt(to);
  })(t0);
}
function playCounts(scope){
  (scope||document).querySelectorAll('[data-count]').forEach(el=>
    animateCount(el, parseFloat(el.getAttribute('data-count'))||0, {money: el.getAttribute('data-money')==='1'}));
}
function fmtK(n){ const s=m().sym, a=Math.abs(n); return (n<0?'-':'')+s+(a>=1000?(a/1000).toFixed(1)+'k':Math.round(a)); }
const GAUGE_CIRC = 2*Math.PI*34;
// Donut gauge. pct 0..1. `animate` starts empty then fills via CSS transition (playGauges).
function gaugeSVG(centerText, label, pct, color, animate){
  const clamped = Math.max(0, Math.min(1, pct)), offset = GAUGE_CIRC*(1-clamped);
  return `<div class="gauge-cell"><svg class="gauge" viewBox="0 0 80 80">
    <circle class="g-track" cx="40" cy="40" r="34"></circle>
    <circle class="g-arc" cx="40" cy="40" r="34" stroke="${color}" style="stroke-dasharray:${GAUGE_CIRC.toFixed(1)};stroke-dashoffset:${(animate?GAUGE_CIRC:offset).toFixed(1)}" data-to="${offset.toFixed(1)}"></circle>
    <text class="g-val" x="40" y="39" dominant-baseline="middle">${centerText}</text>
    <text class="g-lbl" x="40" y="53">${label}</text>
  </svg></div>`;
}
function playGauges(scope){
  requestAnimationFrame(()=>(scope||document).querySelectorAll('.g-arc[data-to]').forEach(a=> a.style.strokeDashoffset = a.getAttribute('data-to')));
}
// DSR / LVR / NDI gauges from a result object.
function resultGauges(r, dsrMax, animate){
  const dsrCol = r.dsr < dsrMax*0.8 ? '#059669' : r.dsr < dsrMax ? '#D97706' : '#DC2626';
  const lvrCol = r.lvr<=80 ? '#059669' : r.lvr<=90 ? '#D97706' : '#DC2626';
  const ndiCol = r.ndi>=0 ? '#059669' : '#DC2626';
  const inc = r.income || r.incomeMo || 1;
  return `<div class="gauge-row">
    ${gaugeSVG(r.dsr.toFixed(0)+'%','DSR', r.dsr/dsrMax, dsrCol, animate)}
    ${gaugeSVG(r.lvrAvailable?r.lvr.toFixed(0)+'%':'—','LVR', r.lvrAvailable?r.lvr/100:0, lvrCol, animate)}
    ${gaugeSVG(fmtK(r.ndi),'NDI/MO', r.ndi>0?Math.min(r.ndi/(inc*0.3),1):0, ndiCol, animate)}
  </div>`;
}

function renderCalcResults(animate){
  const box = document.getElementById('calcResults'); if(!box) return;
  const r = computeServiceability();
  const vcls = r.verdict.toLowerCase();
  const vsub = r.verdict==='PASS'?'Within lender appetite':r.verdict==='BORDERLINE'?'Marginal — review carefully':'Does not service';
  // income flow rows
  const flowMax = Math.max(r.income, 1);
  const flows = [

/* ============================================================
   MANUAL / UNVERIFIED CALCULATION
   Lump-sum entry for income/expenses/assets/liabilities with manually
   editable rate, term, tax, shading and buffer — for use by broker,
   banker or lender when verification documents aren't yet available.
   ============================================================ */
function computeManual(){
  const x = state.manual;
  const shaded = (parseFloat(x.incomeAnnual)||0) * ((parseFloat(x.incomeShade)||0)/100);
  const afterTax = shaded * (1 - (parseFloat(x.taxRate)||0)/100);
  const incomeMo = afterTax/12;
  const buffer = (parseFloat(x.bufferPct)||0)/100;
  const newLoanMo = PMT(parseFloat(x.loanAmount)||0, ((parseFloat(x.rate)||0)+buffer*100)/100, parseFloat(x.term)||30);
  const existingDebt = parseFloat(x.liabilitiesMonthly)||0;
  const totalDebt = existingDebt + newLoanMo;
  const living = x.useHEM
    ? getHEM(shaded, 2, parseFloat(x.dependants)||0)
    : (parseFloat(x.expensesMonthly)||0);
  const ndi = incomeMo - totalDebt - living;
  const dsr = incomeMo>0 ? totalDebt/incomeMo*100 : 0;
  const lvr = (parseFloat(x.assets)||0)>0 ? (parseFloat(x.loanAmount)||0)/(parseFloat(x.assets)||0)*100 : 0;
  // DTI = (existing debt BALANCE + new loan) / GROSS annual income (APRA definition).
  // existingDebt is a monthly repayment, so we need a balance input. Use
  // x.existingDebtBalance if present; otherwise estimate from the monthly repayment.
  const exBalance = (parseFloat(x.existingDebtBalance)>0)
    ? parseFloat(x.existingDebtBalance)
    : existingDebt*12*5;   // rough proxy: ~5yr of repayments if no balance entered
  const dti = shaded>0 ? ((parseFloat(x.loanAmount)||0) + exBalance) / shaded : 0;
  const dsrMax = activeDsrMax();
  let verdict;
  if(ndi>0 && dsr<dsrMax) verdict='PASS';
  else if(ndi > -250 && dsr < dsrMax+5) verdict='BORDERLINE';
  else verdict='FAIL';
  return {incomeMo, newLoanMo, existingDebt, totalDebt, living, ndi, dsr, lvr, dti, verdict, assessedRate:(parseFloat(x.rate)||0)+buffer*100, dsrMax};
}

function auditLog(action, detail, actor, role){
  if(!state.auditTrail) state.auditTrail = [];
  state.auditTrail.unshift({ at:new Date().toISOString(), action, detail:detail||'', actor:actor||'Broker', role:role||'broker' });
  if(state.auditTrail.length>200) state.auditTrail.pop();
  logEvent((role==='ai'?'AI Forensics · ':'')+action.replace(/_/g,' ').toLowerCase()+(detail?' — '+detail:''));
}

const fzKind = (status)=> !status ? null : /SCAN/i.test(status) ? 'scanning' : /REVIEW/i.test(status) ? 'review' : /CAUTION/i.test(status) ? 'caution' : 'clear';
function worstForensicStatus(dealId){
  const fs = DOCS.filter(d=>d.deal===dealId && d.forensic && d.forensic.status);
  if(fs.some(d=>/REVIEW/i.test(d.forensic.status))) return 'REVIEW';
  if(fs.some(d=>/CAUTION/i.test(d.forensic.status))) return 'CAUTION';
  if(fs.some(d=>/CLEAR/i.test(d.forensic.status))) return 'CLEAR';
  return null;
}
function fzChip(doc, idx){
  const f = doc.forensic;
  if(!f || !f.status) return `<span class="fz-chip scanning" onclick="scanDocByIndex(${idx})" role="button">Scan</span>`;
  const k = fzKind(f.status);
  if(k==='scanning') return `<span class="fz-chip scanning"><span class="fz-spin"></span> Scanning…</span>`;
  const high = (f.findings||[]).filter(x=>x.severity==='high').length;
  const label = k==='clear' ? '✓ Clear' : k==='caution' ? '▲ Caution' : `⚠ Review${high?' ('+high+')':''}`;
  return `<span class="fz-chip ${k}" onclick="openForensicPanel(${idx})" role="button">${label}</span>`;
}

// Live forensic call — PDF: send raw base64 (Layer 1) + rasterised PNGs (Layer 2); image: send the image.
async function callForensics(file, dealId){
  if(!aiLive()){ toast('Demo mode — sample forensic report. Connect backend for live analysis.', 'info'); return mockForensicReport(file.name, ''); }
  let base64='', images=[];
  try{
    if(file.type==='application/pdf'){ base64 = await fileToB64(file); try{ images = await pdfToImages(file, 2); }catch(e){} }
    else if(file.type && file.type.startsWith('image/')){ images = [{ media_type:file.type, data: await fileToB64(file) }]; }
  }catch(e){}
  let token=''; try{ const { data } = await sbClient.auth.getSession(); token = data && data.session && data.session.access_token; }catch(e){}
  const res = await fetch('/api/forensics', { method:'POST', headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) },
    body: JSON.stringify({ fileName:file.name, mimeType:file.type, base64, images, dealId }) });
  const out = await res.json();
  if(!res.ok) throw new Error(out.error || 'forensics failed');
  return out;
}
async function runCrossCheck(dealId){
  if(!aiLive()) return mockCrossCheck(dealId);
  const docs = DOCS.filter(d=>d.deal===dealId);
  const deal = DEALS.find(x=>x.id===dealId);
  const documents = [{ name:'Application', type:'Application', fields:{ declared_loan: state.calc.newLoan.amount, applicant: deal?deal.name:'' } }]
    .concat(docs.map(d=>({ name:d.name, type:d.type, fields:d.extracted||{} })));
  if(documents.length<2) return { status:'CLEAR', integrity:'No tampering signals detected', findings:[], checked:documents.length, disclaimer:FORENSIC_DISCLAIMER };
  let token=''; try{ const { data } = await sbClient.auth.getSession(); token = data && data.session && data.session.access_token; }catch(e){}
  const res = await fetch('/api/forensics', { method:'POST', headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) },
    body: JSON.stringify({ mode:'crosscheck', dealId, documents }) });
  const out = await res.json();
  if(!res.ok) throw new Error(out.error || 'crosscheck failed');
  return out;
}

function refreshDocViews(){
  const db = document.getElementById('docBody'); if(db) renderDocBody();
  updateDealStrip(); updateCopilot();
}
async function scanDoc(doc, file){
  if(!doc) return;
  // Live re-scan without the original file: keep the prior real result rather than mock over it.
  if(aiLive() && !file && doc.forensic && doc.forensic.status && !/SCAN/i.test(doc.forensic.status)){ refreshDocViews(); return; }
  doc.forensic = Object.assign({}, doc.forensic, { status:'SCANNING' });
  refreshDocViews();
  let report = null;
  if(aiLive() && file){ try{ report = await callForensics(file, doc.deal); }catch(e){ report = null; } }
  if(!report) report = mockForensicReport(doc.name, doc.type);
  doc.forensic = { status:report.status, integrity:report.integrity, findings:report.findings||[], scannedAt:report.analysedAt||new Date().toISOString(), reviewed:false, disclaimer:report.disclaimer||FORENSIC_DISCLAIMER, demo:report.demo };
  auditLog('FORENSIC_RUN', doc.name+' → '+doc.forensic.status, 'AI Forensics', 'ai');
  refreshDocViews();
  return doc.forensic;
}
function scanDocByIndex(i){ scanDoc(DOCS[i]); }
function scanAllDocs(dealId){
  const docs = dealId ? DOCS.filter(d=>d.deal===dealId) : DOCS;

// Escape user-controlled strings (filenames, extracted values) for safe rendering.
function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// For a value placed inside a single-quoted JS string within a double-quoted HTML attribute (onclick handlers).
function escArg(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[&"<>]/g, c=>({'&':'&amp;','"':'&quot;','<':'&lt;','>':'&gt;'}[c])); }
// Alias for HTML text-context escaping (used widely in render templates).
function esc(s){ return escHtml(s); }
const wait = ms => new Promise(r=>setTimeout(r, ms));
function freqMult(freq){ const f=(freq||'').toLowerCase(); if(/fortn/.test(f)) return 26; if(/week/.test(f)) return 52; if(/month/.test(f)) return 12; if(/year|ann/.test(f)) return 1; if(/quarter/.test(f)) return 4; return 12; }
const numOf = v => { const n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; };

/* ---------- pipeline queue (concurrency 3) ---------- */
let pipelineQ = [], pipelineActive = 0; const PIPE_CONC = 3;
function enqueuePipeline(doc, dealId){ pipelineQ.push({doc, dealId}); pumpPipe(); }
function pumpPipe(){
  while(pipelineActive < PIPE_CONC && pipelineQ.length){
    const { doc, dealId } = pipelineQ.shift();
    pipelineActive++;
    runPipeline(doc, dealId).catch(()=>{}).then(()=>{ pipelineActive--; renderPipelinePanel(); pumpPipe(); });
  }
  renderPipelinePanel();
}
function pipelineProgress(){
  const wp = DOCS.filter(d=>d.pipeline);
  return { total: wp.length, done: wp.filter(d=>['done','error'].includes(d.pipeline.stage)).length,
    running: wp.find(d=>!['done','error','queued'].includes(d.pipeline.stage)),
    queued: wp.filter(d=>d.pipeline.stage==='queued').length };
}
function renderPipelinePanel(){
  const el = document.getElementById('pipelinePanel'); if(!el) return;
  const p = pipelineProgress();
  if(!p.total){ el.style.display='none'; return; }
  el.style.display='block';
  if(p.done>=p.total){ el.innerHTML = `<div class="card" style="padding:12px 14px;border-left:4px solid var(--green)">✓ Pipeline complete — ${p.done} document(s) classified, extracted, scanned & reconciled.</div>`; return; }
  el.innerHTML = `<div class="card" style="padding:12px 14px;border-left:4px solid var(--brand)"><b>Processing ${p.done} of ${p.total}</b> — ${p.running?p.running.pipeline.stage:'queued'}${p.queued?` · ${p.queued} queued`:''}<div class="progress" style="margin-top:8px"><span style="width:${Math.round(p.done/p.total*100)}%"></span></div></div>`;
}

/* ---------- per-document pipeline ---------- */
async function runPipeline(doc, dealId){
  doc.pipeline = doc.pipeline || { stage:'queued', progress:0, error:null };
  const step = (stage, prog, status)=>{ doc.pipeline.stage=stage; doc.pipeline.progress=prog; if(status) doc.status=status; refreshDocViews(); };
  try{
    step('classifying', 20, 'Classifying'); await classifyDoc(doc, doc._file);
    step('extracting', 50, 'Extracting'); await extractDoc(doc, doc._file);
    step('scanning', 72, 'Scanning'); await scanDoc(doc, doc._file);
    step('reconciling', 90, 'Reconciling'); reconcile(doc, dealId);
    step('done', 100, 'Verified');
    auditLog('DOC_PIPELINE', doc.name+' → done', 'AI Pipeline', 'ai');
  }catch(e){ doc.pipeline.stage='error'; doc.pipeline.error=String(e&&e.message||e); doc.status='Error'; refreshDocViews(); }
}

/* ---------- classification ---------- */
function mockClassify(name){
  const n=(name||'').toLowerCase(); let type='other';
  if(/payslip|pay_slip|wage/.test(n)) type='payslip';
  else if(/loan/.test(n)) type='existing_loan_statement';
  else if(/(bank.?statement|statement)/.test(n) && !/smsf/.test(n)) type='bank_statement';
  else if(/tax_?return|tax/.test(n)) type='tax_return';
  else if(/noa|notice/.test(n)) type='noa';
  else if(/trust|deed/.test(n)) type='trust_deed';
  else if(/smsf/.test(n)) type='savings_statement';
  else if(/rates/.test(n)) type='rates_notice';
  else if(/rental|rent/.test(n)) type='rental_statement';
  else if(/company|financials/.test(n)) type='company_financials';
  else if(/id|licen|passport|verify/.test(n)) type='id_document';
  const hint = (name||'').split(/[_\s.]/)[0] || '';
  return { type, applicant_hint:hint, period:'', issuer:'', confidence: type==='other'?62:Math.round(88+Math.random()*9) };
}
async function callClassify(file){
  let images=[], base64='';
  if(file.type==='application/pdf'){ try{ images=await pdfToImages(file,1); }catch(e){} base64=await fileToB64(file); }
  else if(file.type && file.type.startsWith('image/')){ images=[{ media_type:file.type, data:await fileToB64(file) }]; }
  let token=''; try{ const { data }=await sbClient.auth.getSession(); token=data&&data.session&&data.session.access_token; }catch(e){}
  const res=await fetch('/api/classify',{ method:'POST', headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) }, body: JSON.stringify({ fileName:file.name, mimeType:file.type, base64, images }) });
  const j=await res.json(); if(!res.ok) throw new Error(j.error||'classify failed'); return j;
}
async function classifyDoc(doc, file){
  let result=null;
  if(aiLive() && file && file.type){ try{ result=await callClassify(file); }catch(e){} }
  if(!result) result=mockClassify(doc.name);
  doc.classified=result;
  doc.type=(DOC_TYPES[result.type]||{}).label || (result.type||'Other');
  doc.conf=result.confidence||0;
  if(!aiLive()) await wait(45);
}
