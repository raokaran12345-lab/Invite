    case 'rental_statement': return { property_address:F('14 Smith St',92,'14 Smith St'), gross_rent:F(650,90,'Rent $650/wk'), frequency:F('weekly',96,'Weekly'), net_rent:F(585,88,'Net $585') };
    default: return {};
  }
}
async function callTypedExtract(file, docType, schema){
  const payload=await buildExtractPayload([file]);
  let token=''; try{ const { data }=await sbClient.auth.getSession(); token=data&&data.session&&data.session.access_token; }catch(e){}
  const res=await fetch('/api/extract',{ method:'POST', headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) }, body: JSON.stringify({ files:payload, docType, schema }) });
  const j=await res.json(); if(!res.ok) throw new Error(j.error||'extract failed'); return j.fields||{};
}
async function extractDoc(doc, file){
  const type=doc.classified?doc.classified.type:'other';
  const schema=EXTRACT_SCHEMAS[type];
  let fields=null;
  if(aiLive() && file && file.type && schema){ try{ fields=await callTypedExtract(file, type, schema); }catch(e){} }
  if(!fields) fields=mockExtract(type, doc.name);
  doc.extracted={ fields };
  if(!aiLive()) await wait(45);
}

/* ---------- reconciliation into the deal (with provenance) ---------- */
function mkProv(doc, field, fobj){ return { doc:doc.name, field, source_text:(fobj&&fobj.source_text)||'', confidence:(fobj&&fobj.confidence)||0, verified:false, verifiedAt:null }; }
function matchEntity(doc, dealId){
  const hint=((doc.classified&&doc.classified.applicant_hint)||'').toLowerCase();
  const ents=state.calc.entities;
  if(hint){ const idx=ents.findIndex(e=> hint.split(/\s+/).some(tok=> tok.length>2 && (e.name||'').toLowerCase().includes(tok))); if(idx>=0) return idx; }
  if(ents.length>1 && hint && doc.reconciled) doc.reconciled.needsAssign=true;
  return 0;
}
function addProvIncome(E, line, prov){ line._prov=prov; E.incomes.push(line); }
function addProvLiab(E, line, prov){ line._prov=prov; E.liabilities.push(line); }
function reconcile(doc, dealId){
  if(doc._reconciled) return;
  const f=(doc.extracted&&doc.extracted.fields)||{};
  const ei=matchEntity(doc, dealId);
  const E=state.calc.entities[ei] || state.calc.entities[0];
  const t=doc.classified?doc.classified.type:'other';
  doc.reconciled=doc.reconciled||{ entityIdx:ei };
  if(t==='payslip' && f.gross_period){
    const annual=numOf(f.gross_period.value)*freqMult(f.frequency&&f.frequency.value);
    addProvIncome(E, {type:'salary_ft', amount:annual, amount_y1:annual, amount_y2:0, use_average:false, evidence_years:2}, mkProv(doc,'gross_period',f.gross_period));
    if(f.ytd_gross){ noteConflictIfDiff(dealId,'Annual income', annual, doc.name+' (gross×freq)', numOf(f.ytd_gross.value), doc.name+' (YTD annualised)', 0.08); }
  } else if(t==='tax_return' && f.business_income){
    addProvIncome(E, {type:'self_emp', amount:numOf(f.business_income.value), amount_y1:numOf(f.business_income.value), amount_y2:0, use_average:false, evidence_years:2}, mkProv(doc,'business_income',f.business_income));
  } else if(t==='company_financials'){
    const se=E.incomes.find(i=>i.type==='self_emp');
    if(se){ if(f.depreciation) se.addback_depreciation=numOf(f.depreciation.value); if(f.interest_expense) se.addback_interest=numOf(f.interest_expense.value); if(f.lease_expense) se.addback_lease=numOf(f.lease_expense.value); se._prov=se._prov||mkProv(doc,'add-backs',f.depreciation); }
  } else if(t==='existing_loan_statement' && f.current_balance){
    addProvLiab(E, {type:'mortgage', balance:numOf(f.current_balance.value), rate:numOf(f.interest_rate&&f.interest_rate.value), term:25}, mkProv(doc,'current_balance',f.current_balance));
  } else if(t==='rental_statement' && f.net_rent){
    const annual=numOf(f.net_rent.value)*freqMult(f.frequency&&f.frequency.value);
    addProvIncome(E, {type:'rental_res', amount:annual, amount_y1:annual, amount_y2:0, use_average:false, evidence_years:2}, mkProv(doc,'net_rent',f.net_rent));
  } else if(t==='noa' && f.hecs_balance){
    addProvLiab(E, {type:'hecs', balance:numOf(f.hecs_balance.value), rate:0, term:0}, mkProv(doc,'hecs_balance',f.hecs_balance));
  }
  doc._reconciled=true;
  persistDealIntel(dealId);
  if(state.page==='serviceability') updateStatusStrip();
}
function noteConflictIfDiff(dealId, field, a, sa, b, sb, tol){
  if(!a||!b) return;
  const diff=Math.abs(a-b)/Math.max(a,b);
  if(diff>tol) addConflict(dealId, { field, value_a:fmtMoney(a), source_a:sa, value_b:fmtMoney(b), source_b:sb, severity: diff>0.2?'high':'medium', pct:Math.round(diff*100), resolved:false });
}
function addConflict(dealId, c){ state.conflicts=state.conflicts||{}; state.conflicts[dealId]=state.conflicts[dealId]||[]; if(!state.conflicts[dealId].some(x=>x.field===c.field)) state.conflicts[dealId].push(c); }
function resolveConflict(dealId, field, which){
  const cs=(state.conflicts&&state.conflicts[dealId])||[]; const c=cs.find(x=>x.field===field);
  if(c){ c.resolved=true; c.chosen=which; auditLog('CONFLICT_RESOLVED', field+' → '+(which==='a'?c.source_a:c.source_b), 'Broker','broker'); toast('Conflict resolved','ok'); }
  const pg=document.getElementById('page-documents'); if(pg) renderDocuments(pg); updateCopilot();
}

/* ---------- provenance / source tracing ---------- */
function collectProvenance(){
  const out=[];
  state.calc.entities.forEach(e=>{
    (e.incomes||[]).forEach(i=>{ if(i._prov) out.push(Object.assign({kind:'income', label:(INCOME_TYPES[i.type]||i.type), amount:i.amount}, i._prov)); });
    (e.liabilities||[]).forEach(l=>{ if(l._prov) out.push(Object.assign({kind:'liability', label:(LIAB_TYPES[l.type]||l.type), balance:l.balance}, l._prov)); });
  });
  return out;
}
function persistDealIntel(dealId){
  const deal=DEALS.find(x=>x.id===dealId); if(!deal) return;
  deal.docIntel={ provenance:collectProvenance(), conflicts:(state.conflicts&&state.conflicts[dealId])||[], updatedAt:new Date().toISOString() };
  // Snapshot multi-entity + multi-security so saveDeal/loadDeals round-trips them.
  deal.intel = JSON.parse(JSON.stringify({ entities: state.calc.entities, securities: state.calc.securities||[] }));
}
function showProv(docName, field){
  const p=collectProvenance().find(x=>x.doc===docName && x.field===field) || { doc:docName, field };
  toast(`from ${p.doc} · "${p.source_text||'—'}" · ${p.confidence||0}% confidence${p.verified?(' · verified '+(p.verifiedAt||'')):''}`, 'info');
}
function provBadge(prov){ if(!prov) return ''; return ` <span class="prov" role="button" title="Source: ${escHtml(prov.doc)}" onclick="event.stopPropagation();showProv('${escArg(prov.doc)}','${escArg(prov.field)}')">ⓘ</span>`; }

/* ---------- missing-document intelligence ---------- */
const REQUIRED_DOCS={ base:['payslip','bank_statement','id_document'], selfEmployed:['tax_return','noa','company_financials'], investment:['rental_statement'] };
function requiredDocTypesFor(deal){
  if(!deal) return [];
  let req=[...REQUIRED_DOCS.base];
  const t=(deal.type||'').toLowerCase();
  const selfEmp=/commercial|smsf/.test(t) || state.calc.entities.some(e=>e.incomes.some(i=>i.type==='self_emp'));
  if(selfEmp) req=req.concat(REQUIRED_DOCS.selfEmployed);
  if(/investment/.test(t)) req=req.concat(REQUIRED_DOCS.investment);
  return [...new Set(req)];
}
function missingDocTypes(dealId){
  const deal=DEALS.find(x=>x.id===dealId);
  const present=new Set(DOCS.filter(d=>d.deal===dealId && d.classified).map(d=>d.classified.type));
  return requiredDocTypesFor(deal).filter(t=>!present.has(t));
}

/* ---------- pipeline summary + review entry ---------- */
function pipelineSummary(dealId){
  const docs=DOCS.filter(d=>d.deal===dealId);
  const extracted=docs.filter(d=>d.extracted && Object.keys(d.extracted.fields||{}).length);
  const highConf=extracted.filter(d=>Object.values(d.extracted.fields||{}).every(v=>(v.confidence||0)>=80));
  const needReview=extracted.filter(d=>!d.reviewed);
  const integrityFlags=docs.filter(d=>d.forensic && /REVIEW/i.test(d.forensic.status||''));
  const conflicts=((state.conflicts&&state.conflicts[dealId])||[]).filter(c=>!c.resolved);
  return { total:docs.length, extracted:extracted.length, highConf:highConf.length, needReview:needReview.length, integrityFlags:integrityFlags.length, conflicts:conflicts.length, missing:missingDocTypes(dealId).length };
}
function pipelineSummaryHTML(dealId){

// Income/existingDebt/HEM computed under a SPECIFIC lender's shading + HECS rule.
function figuresForLender(id){
  const buffer = activeBuffer(id);
  let shadedAnnual = 0, existingDebt = 0, totalLiab = 0;
  state.calc.entities.forEach(ent=>{
    const w=entityWeight(ent); if(!w) return;
    ent.incomes.forEach(inc=> shadedAnnual += getShadedIncome(inc, id) * w);
  });
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=>{
    if(!entityWeight(ent)) return;
    ent.liabilities.forEach(l=>{
      let assessed = assessLiability(l, buffer);
      if(l.type==='hecs') assessed -= hecsExclusion(l, income, id);
      existingDebt += Math.max(0, assessed);
      // Credit-card LIMIT is not outstanding debt — exclude from the DTI balance sum.
    if(l.type!=='credit_card') totalLiab += parseFloat(l.balance)||0;
    });
  });
  const HEM = getHEM(shadedAnnual, state.calc.adults||1, state.calc.dependants);
  return {income, shadedAnnual, existingDebt, HEM, totalLiab};
}
function rankLenders(){
  const loan = parseFloat(state.calc.newLoan.amount)||0;
  const term = state.calc.newLoan.term;
  let rows;
  if(state.market==='AU' && Object.keys(lenderDB()).length){
    // Each lender uses ITS OWN buffer, DSR ceiling, base rate and income shading.
    rows = Object.keys(lenderDB()).filter(id=> state.accreditedLenders.length===0 || state.accreditedLenders.includes(id)).map(id=>{
      const p = lenderDB()[id];
      const fig = figuresForLender(id);
      const rate = p.base_rate;
      const aRate = rate + p.buffer*100;
      const pmt = PMT(loan, rate/100, term);
      const aPmt = PMT(loan, aRate/100, term);
      const totalDebt = fig.existingDebt + aPmt;
      const ndi = fig.income - totalDebt - fig.HEM;
      const dsr = fig.income>0 ? totalDebt/fig.income*100 : 0;
      const totalCost = pmt*term*12;
      const serviceable = ndi>0 && dsr<p.dsr_max;
      const maxLvr = p.max_lvr_owner_occ_pi || p.max_lvr_owner_occ || 0;
      // Borrowing capacity for THIS borrower under this lender's policy.
      const serv = (amt)=>{ const pm=PMT(amt,(rate+p.buffer*100)/100,term); const td=fig.existingDebt+pm; const n=fig.income-td-fig.HEM; const dd=fig.income>0?td/fig.income*100:0; return n>0&&dd<p.dsr_max; };
      let capacity=0; if(serv(0)){ let lo=0,hi=Math.max(loan,1)*2+500000; for(let k=0;k<36;k++){const mid=(lo+hi)/2; serv(mid)?lo=mid:hi=mid;} capacity=Math.floor(lo/1000)*1000; }
      const hecsLiab = state.calc.entities.some(e=>e.liabilities.some(l=>l.type==='hecs'));
      let edge;
      if(p.income_shading && p.income_shading.hecs && hecsLiab) edge = (p.income_shading.hecs==='exclude_under_20k') ? 'Ignores HECS under $20k' : 'May exclude HECS (12-mo rule)';
      else if(p.buffer<=0.02) edge = `${(p.buffer*100).toFixed(0)}% buffer — more capacity than 3% majors`;
      else edge = `${p.dsr_max}% DSR ceiling, ${(p.buffer*100).toFixed(0)}% buffer`;
      return {l:id, label:p.label||id, type:p.type, isAdi:p.apra_regulated, buffer:p.buffer,
        color:p.lender_color, maxLvr, rate, aRate, pmt, aPmt, dsr, ndi, totalCost, serviceable, capacity, edge};
    });
    rows.sort((a,b)=> (b.serviceable-a.serviceable) || (b.capacity-a.capacity) || (a.rate-b.rate));
    return rows;
  } else {
    // Non-AU markets: keep the original indicative-rate behaviour.
    const r = computeServiceability(), buffer = m().buffer;
    const baseRates = [5.99, 6.09, 6.14, 6.24, 6.34, 6.49];
    rows = m().lenders.slice(0,6).map((l,i)=>{
      const rate = baseRates[i], aRate = rate+buffer*100;
      const pmt = PMT(loan, rate/100, term), aPmt = PMT(loan, aRate/100, term);
      const totalDebt = r.existingDebt+aPmt;
      const ndi = r.income-totalDebt-r.HEM;
      const dsr = r.income>0?totalDebt/r.income*100:0;
      return {l, label:l, type:'bank', isAdi:true, buffer, color:'#5B4FF5', maxLvr:m().dsrMax?95:95,
        rate, aRate, pmt, aPmt, dsr, ndi, totalCost:pmt*term*12, serviceable: ndi>0 && dsr<m().dsrMax};
    });
  }
  rows.sort((a,b)=> (b.serviceable-a.serviceable) || (a.rate-b.rate));
  return rows;
}
// Lowest-rate lender that services the deal as currently structured (AU).
function cheapestServiceableLender(){
  const s = rankLenders().filter(x=>x.serviceable);
  return s.length ? s[0] : null;
}

// AI runs through the server proxy (/api/claude) — the key is NEVER in the browser.
// In static demo mode (no backend / not signed in) we return local mock text.
async function callClaude(prompt){
  if(!aiLive()) return mockCommentary(prompt);
  try{
    let token = '';
    try{ const { data } = await sbClient.auth.getSession(); token = data && data.session && data.session.access_token; }catch(e){}
    const res = await fetch('/api/claude', {
      method:'POST',
      headers:{ 'content-type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) },
      body: JSON.stringify({ prompt, model:'claude-sonnet-4-20250514', max_tokens:700 })
    });
    const data = await res.json();
    if(res.ok && data && data.text) return data.text;
    if(data && data.error) toast('AI: '+data.error, 'err');
  }catch(e){ /* fall back to mock */ }
  return mockCommentary(prompt);
}

/* ============================================================
   EXPLAINABILITY ENGINE
   Turns a PASS/FAIL into the exact lever (and $ impact) to get to PASS.
   ============================================================ */
// Income / existing-debt / HEM figures independent of the proposed new loan.
function baseFigures(){
  const buffer = activeBuffer();
  let shadedAnnual = 0, existingDebt = 0;
  state.calc.entities.forEach(ent=>{
    const w=entityWeight(ent); if(!w) return;
    ent.incomes.forEach(inc=> shadedAnnual += getShadedIncome(inc, state.lender) * w);
  });
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=>{
    if(!entityWeight(ent)) return;
    ent.liabilities.forEach(l=>{
      let assessed = assessLiability(l, buffer);
      if(l.type==='hecs') assessed -= hecsExclusion(l, income);
      existingDebt += Math.max(0, assessed);
    });
  });
  const HEM = getHEM(shadedAnnual, state.calc.adults||1, state.calc.dependants);
  return {income, existingDebt, HEM};
}
function ccLimits(){
  let s = 0;
  state.calc.entities.forEach(e=> e.liabilities.forEach(l=>{ if(l.type==='credit_card') s += parseFloat(l.balance)||0; }));
  return s;
}
// Largest loan that still services, holding everything else constant (binary search).
function maxServiceableLoan(){
  const buffer = activeBuffer(), dsrMax = activeDsrMax(), nl = state.calc.newLoan, base = baseFigures();
  const serv = (amt)=>{
    const pmt = PMT(amt, ((parseFloat(nl.rate)||0)+buffer*100)/100, parseFloat(nl.term)||30);
    const totalDebt = base.existingDebt + pmt;
    const ndi = base.income - totalDebt - base.HEM;
    const dsr = base.income>0 ? totalDebt/base.income*100 : 0;
    return ndi>0 && dsr<dsrMax;
  };
  if(!serv(0)) return 0;
  let lo = 0, hi = (parseFloat(nl.amount)||0)*2 + 200000;
  for(let k=0;k<40;k++){ const mid=(lo+hi)/2; if(serv(mid)) lo=mid; else hi=mid; }
  return Math.floor(lo/1000)*1000;
}
function serviceabilityInsights(r){
  const buffer = activeBuffer(), dsrMax = activeDsrMax(), nl = state.calc.newLoan, loan = parseFloat(nl.amount)||0;
  const pol = activePolicy(), ceilingName = pol ? (pol.label||state.lender) : m().label;
  const out = [];
  if(r.verdict==='PASS'){
    out.push({tone:'green', t:`Surplus of ${fmtMoney(r.ndi)}/mo after ${ceilingName}'s ${(buffer*100).toFixed(0)}% assessment buffer and the HEM floor.`});
    const maxLoan = maxServiceableLoan();
    const extra = maxLoan - loan;
    if(extra > 1000) out.push({tone:'green', t:`Borrowing headroom: about ${fmtMoney(extra)} more before this becomes borderline.`});
    if(r.dsr < dsrMax) out.push({tone:'green', t:`DSR ${r.dsr.toFixed(1)}% sits under the ${dsrMax}% ${ceilingName} ceiling.`});
    return out;
  }
  // Binding constraint headline (§5 "why this isn't working").
  const gaps = [];
  if(r.ndi <= 0) gaps.push(`NDI is ${fmtMoney(r.ndi)}/mo — you're ${fmtMoney(-r.ndi)} short`);
  if(r.dsr >= dsrMax) gaps.push(`DSR ${r.dsr.toFixed(1)}% over the ${dsrMax}% ${ceilingName} ceiling`);
  if(r.dti > 6) gaps.push(`DTI ${r.dti.toFixed(1)}x ${r.dti>9?'(outside major-bank policy)':'(>6x restricted)'}`);
  out.push({tone:'red', head:true, t: gaps.length ? ('Binding constraint: '+gaps.join('; ')+'.') : 'Marginal — review the assumptions carefully.'});
  // Ranked levers, smallest change first, each Applyable.
  const maxLoan = maxServiceableLoan();
  if(maxLoan > 0 && maxLoan < loan){
    out.push({tone:'amber', apply:'maxloan', t:`Drop loan to ${fmtMoney(maxLoan)} (−${fmtMoney(loan-maxLoan)}) → verdict becomes SERVICEABLE.`});
  }
  if(state.market==='AU'){
    const cheaper = cheapestServiceableLender();
    if(cheaper && cheaper.l!==state.lender) out.push({tone:'amber', apply:'lender:'+cheaper.l, t:`Switch to ${cheaper.label} (${(cheaper.buffer*100).toFixed(0)}% buffer) → serviceable as structured.`});
  }
  if((parseFloat(nl.term)||30) < 30){
    const newPmt = PMT(loan, ((parseFloat(nl.rate)||0)+buffer*100)/100, 30);
    const delta = r.newLoanMo - newPmt;
    if(delta > 0) out.push({tone:'amber', apply:'term30', t:`Extend term to 30yr P&I → repayment −${fmtMoney(delta)}/mo, NDI +${fmtMoney(delta)}.`});
  }
  const cc = ccLimits();
  if(cc > 0 && r.ndi < 0){
    const perDollar = 0.038/12;
    const need = Math.min(cc, Math.ceil((-r.ndi)/perDollar/1000)*1000);
    out.push({tone:'amber', t:`Cut credit-card limits by ${fmtMoney(need)} → NDI +${fmtMoney(need*perDollar)}/mo.`});
  }
  return out;
}
function applyLever(kind){
  if(kind==='maxloan') state.calc.newLoan.amount = maxServiceableLoan();
  else if(kind==='term30') state.calc.newLoan.term = 30;
  else if(kind.indexOf('lender:')===0) state.lender = kind.slice(7);
  renderServiceability(document.getElementById('page-serviceability'));
  toast('Applied — recalculated', 'ok');
}

function validateBIDBeforeGenerate(r){
  const pol = activePolicy();
  const warnings = [];
  if(r.verdict === 'FAIL'){
    return { blocked:true, reason:'Loan does not service — DSR '+r.dsr.toFixed(1)+'% or NDI '+fmtMoney(r.ndi)+'/mo. Fix serviceability before generating compliance documents.' };
  }
  if(r.dti > 9) warnings.push('DTI '+r.dti.toFixed(1)+'x exceeds 9x — outside major bank policy. Document why non-bank / specialist lending is appropriate.');
  else if(r.dti > 6) warnings.push('DTI '+r.dti.toFixed(1)+'x exceeds APRA 6x restricted threshold — must document justification.');
  if(r.lvr > 90) warnings.push('LVR '+r.lvr.toFixed(1)+'% — LMI applies. Must explain LMI to client and document their acknowledgement.');
  if(r.ndi < 500 && r.ndi >= 0) warnings.push('NDI only '+fmtMoney(r.ndi)+'/mo — very thin surplus. Document any income not captured or expenses that will reduce.');
  if(state.calc.dependants > 0 && r.income>0 && r.HEM > r.income * 0.4) warnings.push('HEM floor is '+((r.HEM/r.income)*100).toFixed(0)+'% of income with '+state.calc.dependants+' dependant(s). Verify living expenses evidence.');
  return { blocked:false, warnings };
}

Read by a credit assessor; reference specific evidence sources (bank statements, budget tool). Do not claim certainty where there is none. Use [EVIDENCE TYPE] placeholders for the broker to complete.`;

/* ---------- AI Copilot ---------- */
function generateCopilotInsights(){
  const r = computeServiceability();
  const pol = activePolicy();
  const insights = [];
  insights.push({
    type: r.verdict==='PASS'?'success':r.verdict==='BORDERLINE'?'warning':'error',
    icon: r.verdict==='PASS'?'✓':r.verdict==='BORDERLINE'?'▲':'✕',
    text: r.verdict==='PASS' ? `Services with ${fmtMoney(r.ndi)}/mo surplus`
        : r.verdict==='BORDERLINE' ? `Marginal — ${fmtMoney(Math.abs(r.ndi))}/mo ${r.ndi<0?'short':'surplus'}`
        : `Does not service — ${fmtMoney(-r.ndi)}/mo short`
  });
  if(state.market==='AU'){
    const best = cheapestServiceableLender();
    if(best && best.l!==state.lender) insights.push({ type:'suggestion', icon:'★', text:`${best.label} recommended — services this deal`, action:{ label:'Switch', fn:`useLender('${best.l}')` } });
  }
  if(r.dti>6) insights.push({ type:'warning', icon:'⚠', text:`DTI ${r.dti.toFixed(1)}x — APRA restricted (>6x)` });
  const deal = DEALS.find(d=>d.id===state.activeDeal);
  const dealDocs = DOCS.filter(d=>d.deal===state.activeDeal);
  if(deal && dealDocs.length===0) insights.push({ type:'error', icon:'📎', text:'No documents uploaded', action:{ label:'Upload', fn:`goTab('documents')` } });
  if(deal && dealDocs.length){
    const worst = worstForensicStatus(state.activeDeal);
    if(worst==='REVIEW'){ const n = dealDocs.filter(d=>d.forensic && /REVIEW/i.test(d.forensic.status||'')).length; insights.push({ type:'urgent', icon:'⚠', text:`Document integrity: ${n} document(s) need review`, action:{ label:'Review', fn:`goTab('documents')` } }); }
    else if(worst==='CAUTION') insights.push({ type:'warning', icon:'▲', text:'Document integrity: minor anomalies to verify', action:{ label:'Open', fn:`goTab('documents')` } });
    else if(worst==='CLEAR') insights.push({ type:'success', icon:'✓', text:'All documents passed integrity scan' });
  }
  if(deal){
    const conflicts=((state.conflicts&&state.conflicts[state.activeDeal])||[]).filter(c=>!c.resolved).length;
    if(conflicts) insights.push({ type:'urgent', icon:'⚖', text:`${conflicts} document conflict(s) to resolve`, action:{ label:'Resolve', fn:`goTab('documents')` } });
    const need=dealDocs.filter(d=>d.extracted && Object.keys(d.extracted.fields||{}).length && !d.reviewed).length;
    if(need) insights.push({ type:'warning', icon:'📝', text:`${need} extraction(s) need review`, action:{ label:'Review', fn:`goReview()` } });
    const missing=missingDocTypes(state.activeDeal);
    if(missing.length) insights.push({ type:'info', icon:'📂', text:`Missing: ${missing.map(t=>(DOC_TYPES[t]||{}).label||t).slice(0,3).join(', ')}`, action:{ label:'Docs', fn:`goTab('documents')` } });
    // Multi-entity / multi-security insights
    const nEnts = state.calc.entities.length;
    const nSecs = (state.calc.securities||[]).length;
    if(nEnts>1) insights.push({ type:'info', icon:'👥', text:`${nEnts} applicants/entities on this file` });
    if(nSecs>1) insights.push({ type:'info', icon:'🏠', text:`${nSecs} securities · LVR ${r.lvr.toFixed(1)}% across all` });
    const blankSec = (state.calc.securities||[]).find(s=>!(parseFloat(s.value)||0));
    if(blankSec) insights.push({ type:'warning', icon:'⚠', text:'One or more securities has no value entered', action:{ label:'Loan', fn:`goTab('loan')` } });
    const noIncomeEnt = state.calc.entities.filter(e=>e.included!==false && (!e.incomes||!e.incomes.length||e.incomes.every(i=>!(parseFloat(i.amount_y1||i.amount)||0))));
    if(noIncomeEnt.length) insights.push({ type:'warning', icon:'⚠', text:`${noIncomeEnt.length} included entity/entities have no income`, action:{ label:'Calc', fn:`goTab('calculate')` } });
  }
  const hasSelfEmp = state.calc.entities.some(e=> e.incomes.some(i=> i.type==='self_emp'));
  if(hasSelfEmp && pol && pol.self_employed_min_years) insights.push({ type:'info', icon:'ℹ', text:`${pol.label}: ${pol.self_employed_min_years}yr self-employed docs required` });
  if(r.lvr>90) insights.push({ type:'warning', icon:'⚠', text:`LVR ${r.lvr.toFixed(1)}% — LMI required` });
  if(deal && deal.next_action_date){
    const days = Math.ceil((new Date(deal.next_action_date)-new Date())/864e5);
    if(days<=1) insights.push({ type:'urgent', icon:'🔔', text: days<=0 ? `Overdue: ${esc(deal.next_action_note||'Follow up')}` : `Due tomorrow: ${esc(deal.next_action_note||'Follow up')}` });
  }
  return insights;
}

function formatRelativeTime(date){
  const diff = Math.floor((new Date() - date)/1000);
  if(diff<60) return 'Just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return 'Yesterday';
}
function logEvent(text){
  if(!state.eventLog) state.eventLog = [];

function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast '+(type==='ok'?'ok':type==='err'?'err':'info');
  t.innerHTML = (type==='ok'?'✓':type==='err'?'✕':'ℹ') + ' ' + msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(40px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 3200);
}

/* ============================================================
   BACKEND — Supabase auth + persistence (graceful demo fallback)
   ============================================================ */
let sbClient = null;
// AI is "live" only when the server proxy is reachable (Supabase configured + signed in).
function aiLive(){ return !!(state.backend && state.user); }
function syncAi(){ state.anthropicKey = aiLive() ? 'server-proxy' : ''; }
async function initBackend(){
  try{
    const res = await fetch('/api/config');
    if(!res.ok) return;
    const cfg = await res.json();
    if(cfg.supabaseUrl && cfg.supabaseAnonKey && window.supabase && window.supabase.createClient){
      sbClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      state.backend = true;
      const { data } = await sbClient.auth.getSession();
      if(data && data.session){ state.user = data.session.user; }
    }
  }catch(e){ /* static demo mode — no functions/Supabase reachable */ }
  syncAi();
}
async function loadDeals(){
  if(!(state.backend && sbClient && state.user)) return;
  try{
    const { data, error } = await sbClient.from('deals').select('data').order('updated_at',{ascending:false});
    if(error) throw error;
    DEALS = (data||[]).map(r=>mkDeal(r.data));   // backfill schema defaults via mkDeal
  }catch(e){ toast('Could not load saved deals', 'err'); }
}
async function saveDeal(d){
  if(!(state.backend && sbClient && state.user)) return;
  try{
    // Snapshot the live calc onto the deal when saving the active one so financials persist.
    if(state.activeDeal===d.id){ d.calc = JSON.parse(JSON.stringify(state.calc)); }
    await sbClient.from('deals').upsert({ id:d.id, user_id:state.user.id, data:d });
  }
  catch(e){ /* non-fatal in demo */ }
}

function verdictHero(verdict, note, featuredLabel, featuredValue){
  const cls = verdict==='PASS'?'pass':verdict==='BORDERLINE'?'borderline':'fail';
  const statement = verdict==='PASS'?'Serviceable.':verdict==='BORDERLINE'?'Borderline.':'Does not service.';
  return `<div class="verdict-hero">
    <div class="vh-cap">Serviceability verdict</div>
    <div class="vh-statement ${cls}">${escHtml(statement)}</div>
    ${note?`<div class="vh-note">${escHtml(note)}</div>`:''}
    ${featuredValue?`<div class="vh-feature"><span class="vh-label">${escHtml(featuredLabel||'')}</span><span class="vh-value">${escHtml(featuredValue)}</span></div>`:''}
  </div>`;
}
function metricGauge(label, value, cap, opts){
  opts = opts||{};
  const v = +value||0, c = +cap||1;
  const fmt = (n)=> opts.format==='pct' ? (n.toFixed(1)+'%')
                  : opts.format==='money' ? fmtMoney(n)
                  : opts.format==='x' ? (n.toFixed(1)+'x')
                  : String(n);
  // Visual scale: extend track 10% past the cap so the tick has breathing room.
  const trackMax = c * 1.1;
  const ratio = Math.max(0, Math.min(1, v/trackMax));
  const fillPct = ratio * 100;
  const capPosPct = (c / trackMax) * 100;
  // Severity: under 80% of cap = ok, under 100% = warn, ≥100% = bad.
  const r = c>0 ? v/c : 0;
  const sev = r < 0.8 ? 'ok' : r < 1 ? 'warn' : 'bad';
  return `<div class="metric-gauge">
    <div class="mg-head"><span class="mg-label">${escHtml(label)}</span><span class="mg-value">${escHtml(fmt(v))}</span></div>
    <div class="mg-track">
      <div class="mg-fill ${sev}" style="width:${fillPct.toFixed(1)}%"></div>
      <div class="mg-tick" style="left:${capPosPct.toFixed(1)}%"></div>
      <div class="mg-tick-label" style="left:${capPosPct.toFixed(1)}%">cap ${escHtml(fmt(c))}</div>
    </div>
  </div>`;
}
function ledgerRow(opts){
  // {status:'ok'|'warn'|'bad', color, label, note, value}
  const s = opts.status||'';
  return `<div class="ledger-row">
    <span class="lr-status ${s}"></span>
    <span class="lr-dot" style="background:${opts.color||'var(--ink)'}"></span>
    <div><span class="lr-label">${escHtml(opts.label||'')}</span>${opts.note?`<span class="lr-note">${escHtml(opts.note)}</span>`:''}</div>
    <span class="lr-value">${escHtml(opts.value||'—')}</span>
  </div>`;
}
function codeChip(code){ return `<span class="code-chip">${escHtml(code||'')}</span>`; }
function statusPillTone(tone, text){ return `<span class="status-pill ${tone}">${escHtml(text)}</span>`; }
function integrityChipNew(status){
  const k = /REVIEW/i.test(status||'') ? 'review'
          : /CAUTION/i.test(status||'') ? 'caution'
          : /CLEAR/i.test(status||'') ? 'clear'
          : 'scanning';
  return `<span class="integrity-chip ${k}">${escHtml(status||'—')}</span>`;
}

      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--t1);margin-top:14px">Plus Jakarta Sans — UI &amp; body</div>
      <div class="num" style="font-size:14px;color:var(--t1);margin-top:6px">DM Mono — 1,234,567 · 78.5% · $785,000 · 4.2x</div>
    </div>

    <p class="serif-italic" style="margin-top:28px;color:var(--t3-warm)">Phase 1 preview · Phase 2 wires the new shell · Phase 3 the screens.</p>
  </div>`;
}

/* ---------- Boot ---------- */
(async function boot(){
  await initBackend();
  renderLoginMode();
  // ?preview=1 → render the Phase-1 design-system gallery and skip the rest.
  if(typeof location!=='undefined' && (location.search||'').indexOf('preview=1')>-1){
    showDesignPreview(); return;
  }
  if(aiLive()) enterApp();   // already signed in → skip the login screen
})();
</script>
