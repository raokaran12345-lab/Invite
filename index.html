<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebtIQ v6 — Mortgage Broker Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DEBTIQ v6 — Design System
   ============================================================ */
:root{
  --bg:#F4F5F7;
  --surface:#FFFFFF;
  --brand:#5B4FF5;
  --brand-grad:linear-gradient(135deg,#5B4FF5,#8B5CF6,#A78BFA);
  --t1:#0F0F1A;
  --t2:#374151;
  --t3:#6B7280;
  --border:rgba(0,0,0,.06);
  --green:#059669;
  --amber:#D97706;
  --red:#DC2626;
  --teal:#0D9488;
  --r-card:20px;
  --r-input:14px;
  --r-btn:12px;
  --r-pill:100px;
  --sh-1:0 1px 3px rgba(0,0,0,.06);
  --sh-2:0 4px 12px rgba(0,0,0,.08);
  --sh-brand:0 8px 24px rgba(91,79,245,.25);
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--t1)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Animations ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(91,79,245,.5),0 8px 24px rgba(91,79,245,.3)}50%{box-shadow:0 0 28px rgba(139,92,246,.85),0 8px 32px rgba(139,92,246,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}}

/* ============================================================
   LOGIN
   ============================================================ */
#login{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 25% 20%,#2A2350,#15122E 55%,#0B0920);
  padding:20px;
}
.login-card{
  width:420px;max-width:100%;background:var(--surface);
  border-radius:40px;padding:48px 40px;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
  animation:slideUp .4s cubic-bezier(.22,1,.36,1);
  text-align:center;
}
.login-logo{
  width:72px;height:72px;border-radius:22px;margin:0 auto 22px;
  background:var(--brand-grad);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:800;color:#fff;
  animation:glow 3s ease infinite;
}
.login-card h1{font-size:24px;font-weight:800;margin-bottom:6px}
.login-card p.sub{color:var(--t3);margin-bottom:28px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--border);
  border-radius:var(--r-input);background:#FbFbFc;transition:.18s;
}
.field input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(91,79,245,.12)}
.btn-grad{
  width:100%;padding:14px;border-radius:var(--r-btn);color:#fff;font-weight:700;font-size:15px;
  background:var(--brand-grad);box-shadow:var(--sh-brand);transition:.18s;margin-top:6px;
}
.btn-grad:hover{filter:brightness(1.08);transform:translateY(-1px)}
.demo-creds{
  margin-top:22px;font-size:12px;color:var(--t3);
  background:#F4F5F7;border-radius:12px;padding:12px;line-height:1.7;
}
.demo-creds b{color:var(--t2)}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .2s ease;
}
.sidebar.collapsed{width:64px}
.sb-top{padding:18px 16px;display:flex;align-items:center;gap:10px}
.logo-mark{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  background:var(--brand-grad);display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:19px;box-shadow:var(--sh-brand);
}
.wordmark{font-weight:800;font-size:18px;letter-spacing:-.4px}
.sidebar.collapsed .hide-collapse{display:none}
.country-pill{
  margin:0 14px 14px;padding:9px 12px;border:1px solid var(--border);
  border-radius:var(--r-pill);display:flex;align-items:center;gap:8px;cursor:pointer;
  font-weight:600;font-size:13px;transition:.15s;position:relative;
}
.country-pill:hover{border-color:var(--brand);background:#FAFAFF}
.nav{flex:1;overflow-y:auto;padding:4px 10px}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
  color:var(--t2);font-weight:600;font-size:13.5px;cursor:pointer;transition:.13s;margin-bottom:2px;
}
.nav-item:hover{background:#F4F5F7}
.nav-item.active{background:rgba(91,79,245,.1);color:var(--brand)}
.nav-item .ico{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.sb-user{
  margin:10px;padding:10px;border-radius:14px;background:#F4F5F7;
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.avatar{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:var(--brand-grad);color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.sb-collapse{
  margin:0 10px 10px;padding:8px;border-radius:10px;color:var(--t3);
  font-size:12px;font-weight:600;text-align:center;transition:.13s;
}
.sb-collapse:hover{background:#F4F5F7;color:var(--t2)}

/* Main column */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  height:56px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 22px;
}
.topbar h2{font-size:17px;font-weight:700;flex:1}
.badge-live{
  display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:var(--r-pill);
  background:rgba(13,148,136,.1);color:var(--teal);font-weight:700;font-size:12px;
}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.btn-new{
  padding:9px 16px;border-radius:var(--r-btn);color:#fff;font-weight:700;font-size:13px;
  background:var(--brand-grad);box-shadow:var(--sh-brand);transition:.15s;
}
.btn-new:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* Status strip */
.status-strip{
  flex-shrink:0;background:var(--brand-grad);color:#fff;
  display:flex;align-items:center;gap:6px;padding:9px 22px;overflow-x:auto;
  font-size:12px;
}
.status-strip .si{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:0 14px;border-right:1px solid rgba(255,255,255,.2)}
.status-strip .si:last-child{border-right:none}
.status-strip .lbl{opacity:.8;font-weight:600}
.status-strip .val{font-weight:700}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
.page.active{display:block}
.page-head{margin-bottom:20px}
.page-head h1{font-size:22px;font-weight:800}
.page-head p{color:var(--t3);margin-top:3px}

/* ---------- Shared components ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--sh-1)}
.btn{padding:9px 15px;border-radius:var(--r-btn);font-weight:700;font-size:13px;transition:.15s;border:1px solid var(--border);background:#fff;color:var(--t2)}
.btn:hover{filter:brightness(1.03);transform:translateY(-1px);box-shadow:var(--sh-1)}
.btn.primary{background:var(--brand-grad);color:#fff;border:none;box-shadow:var(--sh-brand)}
.btn.ghost{background:#F4F5F7;border-color:transparent}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:var(--r-pill);font-size:11px;font-weight:700}
.pill.green{background:rgba(5,150,105,.12);color:var(--green)}
.pill.amber{background:rgba(217,119,6,.12);color:var(--amber)}
.pill.red{background:rgba(220,38,38,.12);color:var(--red)}
.pill.violet{background:rgba(91,79,245,.12);color:var(--brand)}
.pill.gray{background:#EEF0F3;color:var(--t3)}
.progress{height:7px;border-radius:6px;background:#EEF0F3;overflow:hidden}
.progress>span{display:block;height:100%;background:var(--brand-grad);border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:18px;box-shadow:var(--sh-1);border-top:3px solid var(--brand);transition:.18s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.kpi .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.kpi .num{font-size:26px;font-weight:800}
.kpi .cap{color:var(--t3);font-size:12.5px;font-weight:600;margin-top:2px}

/* Deal grid */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:var(--r-input);background:#fff}
.search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px rgba(91,79,245,.1)}
.search .si-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3)}
.filters{display:flex;gap:6px}
.chip{padding:8px 14px;border-radius:var(--r-pill);font-weight:600;font-size:12.5px;border:1px solid var(--border);background:#fff;color:var(--t2);transition:.13s}
.chip:hover{border-color:var(--brand)}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.deal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:16px}
.deal-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-card);padding:18px;cursor:pointer;transition:.18s;box-shadow:var(--sh-1)}
.deal-card:hover{border-color:var(--brand);box-shadow:var(--sh-2);transform:translateY(-2px)}
.deal-card .dc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.deal-card .dc-name{font-weight:700;font-size:15px}
.deal-card .dc-id{color:var(--t3);font-size:12px;margin-bottom:12px}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.metric-box{background:#F4F5F7;border-radius:11px;padding:9px 10px}
.metric-box .mb-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.metric-box .mb-val{font-weight:700;font-size:13.5px;margin-top:2px}
.ai-bar{margin-top:12px}
.ai-bar .lbl{font-size:11px;color:var(--brand);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between}

/* Slide-over panel */
.overlay{position:fixed;inset:0;background:rgba(15,15,26,.4);z-index:900;display:none}
.overlay.show{display:block}
.panel{
  position:fixed;top:0;right:0;height:100%;width:440px;max-width:92vw;background:var(--surface);
  z-index:901;box-shadow:-10px 0 40px rgba(0,0,0,.18);transform:translateX(100%);
  display:flex;flex-direction:column;
}
.panel.show{animation:slideIn .25s cubic-bezier(.22,1,.36,1) forwards}
.panel-head{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.panel-body{flex:1;overflow-y:auto;padding:22px}
.panel-x{font-size:22px;color:var(--t3);line-height:1;background:none}
.detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.detail-row .dl{color:var(--t3);font-weight:600}
.detail-row .dv{font-weight:700}

/* ============================================================
   WIZARD
   ============================================================ */
.wiz-head{background:var(--brand-grad);color:#fff;border-radius:var(--r-card);padding:24px;margin-bottom:20px}
.wiz-head h1{font-size:22px;font-weight:800}
.wiz-head p{opacity:.85;margin-top:3px}
.wiz-steps{display:flex;gap:6px;margin-top:18px;flex-wrap:wrap}
.wiz-step{flex:1;min-width:90px;text-align:center}
.wiz-step .bar{height:5px;border-radius:5px;background:rgba(255,255,255,.3);transition:.4s}
.wiz-step.done .bar,.wiz-step.cur .bar{background:#fff}
.wiz-step .nm{font-size:11px;margin-top:6px;opacity:.8;font-weight:600}
.wiz-step.cur .nm{opacity:1}
.wiz-card{background:var(--surface);border:2px solid var(--border);border-radius:28px;padding:28px;box-shadow:var(--sh-1)}
.wiz-card.active{border-color:var(--brand)}
.wiz-card h3{font-size:18px;font-weight:700;margin-bottom:4px}
.wiz-card .desc{color:var(--t3);margin-bottom:20px}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.tile{border:1.5px solid var(--border);border-radius:var(--r-input);padding:16px;text-align:center;cursor:pointer;transition:.15s;font-weight:600}
.tile:hover{border-color:var(--brand)}
.tile.sel{border-color:var(--brand);background:rgba(91,79,245,.06)}
.tile .tt{font-size:14px}
.tile .ts{font-size:11px;color:var(--t3);font-weight:500;margin-top:3px}
.wiz-nav{display:flex;justify-content:space-between;margin-top:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.inp{display:flex;flex-direction:column;gap:6px}
.inp label{font-size:12px;font-weight:600;color:var(--t2)}
.inp input,.inp select,.inp textarea{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-input);background:#FbFbFc;transition:.15s}
.inp input:focus,.inp select:focus,.inp textarea:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(91,79,245,.1)}
.upload-zone{border:2px dashed #CBD2DC;border-radius:var(--r-input);padding:22px;text-align:center;cursor:pointer;transition:.18s;color:var(--t3);font-weight:600}
.upload-zone:hover{border-color:var(--brand);color:var(--brand)}
.upload-zone.done{border-style:solid;border-color:var(--green);background:rgba(5,150,105,.06);color:var(--green)}
.lvr-badge{padding:16px;border-radius:var(--r-input);text-align:center;font-weight:800;font-size:24px;margin-top:14px}

/* ============================================================
   SERVICEABILITY CALCULATOR
   ============================================================ */
.calc-split{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
.calc-results{position:sticky;top:0}
.entity-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);margin-bottom:14px;box-shadow:var(--sh-1)}
.entity-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.entity-head h4{font-size:15px;font-weight:700}
.entity-body{padding:0 16px 16px}
.row-line{display:grid;grid-template-columns:1.3fr .9fr .55fr .9fr 30px;gap:7px;align-items:center;margin-bottom:7px}
.row-line.liab{grid-template-columns:1.1fr .9fr .6fr .6fr .9fr 30px}
.row-line input,.row-line select{padding:8px 9px;border:1px solid var(--border);border-radius:9px;background:#FbFbFc;font-size:12.5px;width:100%}
.row-line input:focus,.row-line select:focus{outline:none;border-color:var(--brand);background:#fff}
.row-line .computed{font-weight:700;font-size:12.5px;color:var(--t2);text-align:right}
.row-x{color:var(--t3);font-size:16px;text-align:center}
.row-head{display:grid;grid-template-columns:1.3fr .9fr .55fr .9fr 30px;gap:7px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding:0 2px}
.row-head.liab{grid-template-columns:1.1fr .9fr .6fr .6fr .9fr 30px}
.add-row{margin-top:6px;font-size:12px;color:var(--brand);font-weight:700;background:none}
.subsec{font-size:12px;font-weight:700;color:var(--t2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.slider-row{margin-bottom:14px}
.slider-row label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:7px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:5px;background:#E5E8EE}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);box-shadow:var(--sh-brand);cursor:pointer}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:var(--brand);box-shadow:var(--sh-brand);cursor:pointer}
.assessed-note{background:rgba(217,119,6,.08);color:var(--amber);border-radius:11px;padding:10px 13px;font-weight:600;font-size:12.5px;margin-top:10px}

/* Results panel */
.verdict{border-radius:var(--r-card);padding:22px;text-align:center;color:#fff;margin-bottom:16px}
.verdict.pass{background:linear-gradient(135deg,#059669,#10B981)}
.verdict.borderline{background:linear-gradient(135deg,#D97706,#F59E0B)}
.verdict.fail{background:linear-gradient(135deg,#DC2626,#EF4444)}
.verdict .v-lbl{font-size:12px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.6px}
.verdict .v-big{font-size:30px;font-weight:800;margin-top:4px}
.verdict .v-sub{font-size:12.5px;opacity:.9;margin-top:4px}
.res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;text-align:center}
.res-box .rl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.res-box .rv{font-size:18px;font-weight:800;margin-top:3px}
.flow-chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px}
.flow-chart h4,.stress-table h4{font-size:13px;font-weight:700;margin-bottom:12px}
.flow-row{margin-bottom:10px}
.flow-row .fl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.flow-bar{height:9px;border-radius:6px;background:#EEF0F3;overflow:hidden}
.flow-bar>span{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.stress-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--t3);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:7px 6px;border-bottom:1px solid var(--border)}
td{padding:9px 6px;border-bottom:1px solid var(--border);font-weight:500}
tr:last-child td{border-bottom:none}

/* ============================================================
   COMMENTARY
   ============================================================ */
.commentary-wrap{max-width:820px;margin:0 auto}
.comm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:20px;margin-bottom:14px;box-shadow:var(--sh-1)}
.comm-card.broker{border-left:4px solid var(--amber)}
.comm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.comm-head h4{font-size:15px;font-weight:700}
.comm-text{color:var(--t2);line-height:1.65;white-space:pre-wrap}
.comm-card textarea{width:100%;min-height:110px;padding:12px;border:1.5px solid var(--brand);border-radius:12px;line-height:1.6;resize:vertical}
.mini-btn{padding:5px 11px;border-radius:9px;font-size:11.5px;font-weight:700;border:1px solid var(--border);background:#fff;color:var(--t2);transition:.13s}
.mini-btn:hover{border-color:var(--brand);color:var(--brand)}

/* ============================================================

<script>
/* ============================================================
   DEBTIQ v6 — Application Logic
   ============================================================ */

/* ---------- 6 Country Markets ---------- */
const MARKETS = {
  AU:{code:'AU',label:'Australia',flag:'🇦🇺',cur:'AUD',sym:'$',buffer:0.03,dsrMax:45,hem:2200,
      lenders:['CBA','ANZ','NAB','Westpac','Macquarie','ING','Suncorp','St George','Pepper','Liberty']},
  US:{code:'US',label:'United States',flag:'🇺🇸',cur:'USD',sym:'$',buffer:0.02,dsrMax:43,hem:2400,
      lenders:['Chase','Wells Fargo','Bank of America','Rocket','United Wholesale','Pennymac','loanDepot','Caliber','Fairway','Guild']},
  UK:{code:'UK',label:'United Kingdom',flag:'🇬🇧',cur:'GBP',sym:'£',buffer:0.03,dsrMax:40,hem:1800,
      lenders:['Barclays','HSBC','NatWest','Lloyds','Santander','Halifax','Nationwide','Virgin Money','Metro','Accord']},
  CA:{code:'CA',label:'Canada',flag:'🇨🇦',cur:'CAD',sym:'$',buffer:0.02,dsrMax:44,hem:2100,
      lenders:['TD Bank','RBC','BMO','Scotiabank','CIBC','National Bank','HSBC Canada','Desjardins','Meridian','First National']},
  NZ:{code:'NZ',label:'New Zealand',flag:'🇳🇿',cur:'NZD',sym:'$',buffer:0.03,dsrMax:40,hem:1900,
      lenders:['ANZ NZ','ASB','BNZ','Westpac NZ','Kiwibank','SBS Bank','TSB','Co-op Bank','Pepper NZ','Resimac']},
  IN:{code:'IN',label:'India',flag:'🇮🇳',cur:'INR',sym:'₹',buffer:0.02,dsrMax:50,hem:35000,
      lenders:['SBI','HDFC','ICICI','Axis Bank','Kotak','LIC Housing','PNB Housing','Bajaj Housing','Indiabulls','Tata Capital']}
};

/* ---------- Income shading multipliers ---------- */
const SHADE = {
  salary_ft:1.00, salary_pt:1.00, self_emp:1.00, freelance:0.90, overtime:0.80,
  rental_res:0.80, rental_com:0.75, dividends:0.75, trust_dist:0.80,
  pension:1.00, family:1.00, foreign:0.80, boarder:0.60, interest:1.00
};
const INCOME_TYPES = {
  salary_ft:'Salary (Full-time)', salary_pt:'Salary (Part-time)', self_emp:'Self-employed',
  freelance:'Freelance', overtime:'Overtime', rental_res:'Rental (Residential)',
  rental_com:'Rental (Commercial)', dividends:'Dividends', trust_dist:'Trust Distribution',
  pension:'Pension', family:'Family Payments', foreign:'Foreign Income',
  boarder:'Boarder Income', interest:'Interest Income'
};
const LIAB_TYPES = {
  mortgage:'Mortgage', personal:'Personal Loan', car:'Car Loan',
  credit_card:'Credit Card', hecs:'HECS/Student', bnpl:'BNPL', other:'Other'
};

/* ---------- Finance engine ---------- */
function PMT(principal, annualRate, years){
  const r = annualRate/12, n = years*12;
  if(principal<=0) return 0;
  if(r===0) return principal/n;
  return (principal*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
function assessLiability(l, buffer){
  const bal = parseFloat(l.balance)||0;
  const rate = (parseFloat(l.rate)||0)/100;
  const term = parseFloat(l.term)||0;
  switch(l.type){
    case 'credit_card': return bal*0.038/12;           // limit * 3.8% / 12
    case 'hecs':        return bal*0.01/12;             // balance * 1% / 12
    default:            return PMT(bal, rate+buffer, term||25); // PMT w/ buffer
  }
}

/* ---------- Demo deals ---------- */

  {id:'D-889', name:'James Okonkwo', lender:'NAB', amount:620000, status:'AI_PROCESSING', lvr:82.1, progress:67, type:'Owner Occupier'},
  {id:'D-888', name:'Patel Family SMSF', lender:'Westpac', amount:1400000, status:'SUBMITTED', lvr:60.0, progress:null, type:'SMSF'},
  {id:'D-887', name:'Amanda Torres', lender:'CBA', amount:495000, status:'APPROVED', lvr:72.3, progress:null, type:'First Home'},
  {id:'D-886', name:'Nguyen Trading Pty', lender:'ANZ', amount:3200000, status:'MORE_INFO', lvr:48.7, progress:null, type:'Commercial'}
];

/* ---------- Demo documents ---------- */
let DOCS = [
  {name:'Mitchell_Payslip_01.pdf', deal:'D-891', type:'Payslip', conf:98, status:'Verified', size:'248 KB', date:'2026-05-20'},
  {name:'Mitchell_BankStatement.pdf', deal:'D-891', type:'Bank Statement', conf:95, status:'Verified', size:'1.2 MB', date:'2026-05-20'},
  {name:'Chen_Trust_Deed.pdf', deal:'D-890', type:'Trust Deed', conf:88, status:'Review', size:'820 KB', date:'2026-05-19'},
  {name:'Okonkwo_Tax_Return.pdf', deal:'D-889', type:'Tax Return', conf:76, status:'Processing', size:'540 KB', date:'2026-05-22'},
  {name:'Patel_SMSF_Statement.pdf', deal:'D-888', type:'SMSF Statement', conf:91, status:'Verified', size:'670 KB', date:'2026-05-18'},
  {name:'Torres_ID_Verify.jpg', deal:'D-887', type:'Identity', conf:99, status:'Verified', size:'310 KB', date:'2026-05-15'}
];

const STATUS_META = {
  BROKER_REVIEW:{label:'Broker Review', cls:'amber'},
  DOCS_PENDING:{label:'Docs Pending', cls:'gray'},
  AI_PROCESSING:{label:'AI Processing', cls:'violet'},
  SUBMITTED:{label:'Submitted', cls:'violet'},
  APPROVED:{label:'Approved', cls:'green'},
  MORE_INFO:{label:'More Info', cls:'red'}
};

/* ---------- App state ---------- */
const state = {
  page:'dashboard',
  market:'AU',
  lender:'CBA',          // active lender for per-lender policy (AU)
  dealFilter:'all',
  dealSearch:'',
  wizStep:1,
  wizData:{lender:null, dealType:null, propValue:1000000, loanAmount:785000, rate:6.24, term:30},
  calc:{
    entities:[
      {name:'Primary Borrower', open:true,
       incomes:[{type:'salary_ft', amount:142000}],
       liabilities:[{type:'credit_card', balance:15000, rate:21.9, term:0}]}
    ],
    dependants:0,
    newLoan:{amount:785000, rate:6.24, term:30}
  }
};
const fmtMoney = (n)=> MARKETS[state.market].sym + Math.round(n).toLocaleString();
const m = ()=> MARKETS[state.market];

/* ============================================================
   LENDER POLICY ACCESSORS (from lenders.js)
   Per-lender rules apply only for AU + a known lender; every
   other market / unknown lender falls back to market defaults.
   ============================================================ */
const lenderDB = ()=> (typeof window!=='undefined' && window.LENDERS) || (typeof LENDERS!=='undefined' ? LENDERS : {});
function activePolicy(id){
  const lid = id || state.lender;
  if(state.market!=='AU') return null;
  return lenderDB()[lid] || null;
}
function activeBuffer(id){ const p=activePolicy(id); return p ? p.buffer : m().buffer; }
function activeDsrMax(id){ const p=activePolicy(id); return p ? p.dsr_max : m().dsrMax; }
// Lender-aware income shading: policy table → alias family→family_ben → global SHADE → 1.00
function getShadedIncome(type, annual, id){
  const p = activePolicy(id);
  let shade;
  if(p && p.income_shading){
    const key = (type==='family' && p.income_shading.family===undefined) ? 'family_ben' : type;
    shade = p.income_shading[key];
  }
  if(shade===undefined || typeof shade!=='number') shade = (SHADE[type]!==undefined ? SHADE[type] : 1.00);
  return (parseFloat(annual)||0) * shade;
}
// Lender HECS rule: 'exclude_under_20k' (NAB) / 'exclude_if_12mo' (CBA, approximated
// as repayable within 12mo when est. annual compulsory repayment >= balance). Returns
// the monthly HECS amount to drop from commitments (0 = include in full).
function hecsExclusion(balance, income, id){
  const p = activePolicy(id);
  const rule = p && p.income_shading && p.income_shading.hecs;
  const bal = parseFloat(balance)||0;
  if(rule==='exclude_under_20k' && bal < 20000) return bal*0.01/12;
  if(rule==='exclude_if_12mo'){
    const estAnnualRepay = (income*12)*0.07;   // ~top-band compulsory HECS rate
    if(estAnnualRepay >= bal) return bal*0.01/12;
  }
  return 0;
}
// One-line lender description for AI prompts.
function lenderContext(){
  const p = activePolicy();
  if(!p) return `${m().label} market (buffer ${(m().buffer*100).toFixed(0)}%, DSR ${m().dsrMax}%)`;
  return `${p.label} (${p.apra_regulated?'APRA-regulated ADI':'non-bank'}, ${(p.buffer*100).toFixed(0)}% assessment buffer, DSR ceiling ${p.dsr_max}%${p.notes&&p.notes[0]?'; note: '+p.notes[0]:''})`;
}

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(s=>`
    <div class="nav-section hide-collapse">${s.section}</div>
    ${s.items.map(i=>`
      <div class="nav-item ${state.page===i.id?'active':''}" onclick="navigate('${i.id}')">
        <span class="ico">${i.ico}</span><span class="hide-collapse">${i.label}</span>
      </div>`).join('')}
  `).join('');
}

function navigate(page){
  state.page = page;
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page]||'DebtIQ';
  renderNav();
  const c = document.getElementById('content');
  c.innerHTML = `<div class="page active" id="page-${page}"></div>`;
  const target = document.getElementById('page-'+page);
  ({
    dashboard:renderDashboard, aipilot:renderAIPilot, wizard:renderWizard, documents:renderDocuments,
    serviceability:renderServiceability, commentary:renderCommentary, compare:renderCompare,
    portal:renderPortal, markets:renderMarkets, billing:renderBilling, settings:renderSettings
  }[page] || renderDashboard)(target);
  updateStatusStrip();
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('collapsed'); }

/* ============================================================
   COUNTRY SELECTOR
   ============================================================ */
function renderCountryDD(){
  document.getElementById('countryDD').innerHTML = Object.values(MARKETS).map(mk=>`
    <div class="dd-item" onclick="setMarket('${mk.code}',event)">${mk.flag} ${mk.label}</div>`).join('');
}
function toggleCountryDD(e){ e.stopPropagation(); document.getElementById('countryDD').classList.toggle('show'); }
function setMarket(code, e){
  if(e) e.stopPropagation();
  state.market = code;
  if(code==='AU' && !lenderDB()[state.lender]) state.lender = 'CBA';   // keep active lender valid for AU
  const mk = MARKETS[code];
  document.getElementById('countryFlag').textContent = mk.flag;
  document.getElementById('countryName').textContent = mk.label;
  document.getElementById('countryDD').classList.remove('show');
  toast(`Switched to ${mk.label} (${mk.cur})`, 'info');
  navigate(state.page);
}
document.addEventListener('click', ()=> document.getElementById('countryDD').classList.remove('show'));

/* ============================================================
   STATUS STRIP (live)
   ============================================================ */
function updateStatusStrip(){
  const r = computeServiceability();

/* ============================================================
   SERVICEABILITY COMPUTATION
   ============================================================ */
function computeServiceability(){
  const buffer = activeBuffer(), mk = m(), dsrMax = activeDsrMax();
  let shadedAnnual = 0, totalLiab = 0, existingDebt = 0;
  const breakdown = {};
  // First pass for income (needed to evaluate the income-based HECS exclusion).
  state.calc.entities.forEach(ent=> ent.incomes.forEach(inc=>{
    const shaded = getShadedIncome(inc.type, inc.amount);
    shadedAnnual += shaded;
    breakdown[inc.type] = (breakdown[inc.type]||0) + shaded;
  }));
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=> ent.liabilities.forEach(l=>{
    let assessed = assessLiability(l, buffer);
    if(l.type==='hecs') assessed -= hecsExclusion(l.balance, income);  // lender HECS rule
    existingDebt += Math.max(0, assessed);
    totalLiab += parseFloat(l.balance)||0;
  }));
  const nl = state.calc.newLoan;
  const newLoanMo = PMT(parseFloat(nl.amount)||0, ((parseFloat(nl.rate)||0)+buffer*100)/100, parseFloat(nl.term)||30);
  const totalDebt = existingDebt + newLoanMo;
  const HEM = Math.max(mk.hem + state.calc.dependants*700, income*0.28);
  const ndi = income - totalDebt - HEM;
  const dsr = income>0 ? totalDebt/income*100 : 0;
  // LVR: new loan + existing property debt vs property value (assets)
  const propValue = parseFloat(state.wizData.propValue)|| (parseFloat(nl.amount)/0.8) || 1;
  const totalAssets = propValue;
  const totalLiabilities = (parseFloat(nl.amount)||0);
  const lvr = totalAssets>0 ? totalLiabilities/totalAssets*100 : 0;

  let verdict;
  const pass = ndi>0 && dsr<dsrMax;
  if(pass) verdict='PASS';
  else if(ndi>-500 || dsr<dsrMax+10) verdict='BORDERLINE';
  else verdict='FAIL';

  return {income, shadedAnnual, existingDebt, newLoanMo, totalDebt, HEM, ndi, dsr, lvr, verdict, breakdown, assessedRate:(parseFloat(nl.rate)||0)+buffer*100};
}

// Shared lender scoring — used by Lender Compare and AI Pilot.
// Ranks serviceable lenders first, then by lowest rate.
// Income/existingDebt/HEM computed under a SPECIFIC lender's shading + HECS rule.
function figuresForLender(id){
  const mk = m(), buffer = activeBuffer(id);
  let shadedAnnual = 0, existingDebt = 0;
  state.calc.entities.forEach(ent=> ent.incomes.forEach(inc=> shadedAnnual += getShadedIncome(inc.type, inc.amount, id)));
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=> ent.liabilities.forEach(l=>{
    let assessed = assessLiability(l, buffer);
    if(l.type==='hecs') assessed -= hecsExclusion(l.balance, income, id);
    existingDebt += Math.max(0, assessed);
  }));
  const HEM = Math.max(mk.hem + state.calc.dependants*700, income*0.28);
  return {income, existingDebt, HEM};
}
function rankLenders(){
  const loan = parseFloat(state.calc.newLoan.amount)||0;
  const term = state.calc.newLoan.term;
  let rows;
  if(state.market==='AU' && Object.keys(lenderDB()).length){
    // Each lender uses ITS OWN buffer, DSR ceiling, base rate and income shading.
    rows = Object.keys(lenderDB()).map(id=>{
      const p = lenderDB()[id];
      const fig = figuresForLender(id);
      const rate = p.base_rate;
      const aRate = rate + p.buffer*100;
      const pmt = PMT(loan, rate/100, term);
      const aPmt = PMT(loan, aRate/100, term);
      const totalDebt = fig.existingDebt + aPmt;
      const ndi = fig.income - totalDebt - fig.HEM;
      const dsr = fig.income>0 ? totalDebt/fig.income*100 : 0;
      const totalCost = pmt*term*12;
      const serviceable = ndi>0 && dsr<p.dsr_max;
      const maxLvr = p.max_lvr_owner_occ_pi || p.max_lvr_owner_occ || 0;
      return {l:id, label:p.label||id, type:p.type, isAdi:p.apra_regulated, buffer:p.buffer,
        color:p.lender_color, maxLvr, rate, aRate, pmt, aPmt, dsr, ndi, totalCost, serviceable};
    });
  } else {
    // Non-AU markets: keep the original indicative-rate behaviour.
    const r = computeServiceability(), buffer = m().buffer;
    const baseRates = [5.99, 6.09, 6.14, 6.24, 6.34, 6.49];
    rows = m().lenders.slice(0,6).map((l,i)=>{
      const rate = baseRates[i], aRate = rate+buffer*100;
      const pmt = PMT(loan, rate/100, term), aPmt = PMT(loan, aRate/100, term);
      const totalDebt = r.existingDebt+aPmt;
      const ndi = r.income-totalDebt-r.HEM;
      const dsr = r.income>0?totalDebt/r.income*100:0;
      return {l, label:l, type:'bank', isAdi:true, buffer, color:'#5B4FF5', maxLvr:m().dsrMax?95:95,
        rate, aRate, pmt, aPmt, dsr, ndi, totalCost:pmt*term*12, serviceable: ndi>0 && dsr<m().dsrMax};
    });
  }
  rows.sort((a,b)=> (b.serviceable-a.serviceable) || (a.rate-b.rate));
  return rows;
}
// Lowest-rate lender that services the deal as currently structured (AU).
function cheapestServiceableLender(){
  const s = rankLenders().filter(x=>x.serviceable);
  return s.length ? s[0] : null;
}
function renderCompare(el){
  const loan = parseFloat(state.calc.newLoan.amount)||0;
  const term = state.calc.newLoan.term;
  const rows = rankLenders();
  const recommended = rows.find(x=>x.serviceable);
  const bestRate = Math.min(...rows.map(x=>x.rate));
  const auNote = state.market==='AU'
    ? `<div class="card" style="padding:14px 16px;margin-bottom:16px;font-size:12.5px;color:var(--t2)">Each lender is assessed on <b>its own APRA/non-bank buffer, DSR ceiling and income shading</b>. Note how non-banks (1–2% buffer) can service the same client that the 3% majors decline.</div>`
    : '';

/* ============================================================
   EXPLAINABILITY ENGINE
   Turns a PASS/FAIL into the exact lever (and $ impact) to get to PASS.
   ============================================================ */
// Income / existing-debt / HEM figures independent of the proposed new loan.
function baseFigures(){
  const mk = m(), buffer = activeBuffer();
  let shadedAnnual = 0, existingDebt = 0;
  state.calc.entities.forEach(ent=> ent.incomes.forEach(inc=> shadedAnnual += getShadedIncome(inc.type, inc.amount)));
  const income = shadedAnnual/12;
  state.calc.entities.forEach(ent=> ent.liabilities.forEach(l=>{
    let assessed = assessLiability(l, buffer);
    if(l.type==='hecs') assessed -= hecsExclusion(l.balance, income);
    existingDebt += Math.max(0, assessed);
  }));
  const HEM = Math.max(mk.hem + state.calc.dependants*700, income*0.28);
  return {income, existingDebt, HEM};
}
function ccLimits(){
  let s = 0;
  state.calc.entities.forEach(e=> e.liabilities.forEach(l=>{ if(l.type==='credit_card') s += parseFloat(l.balance)||0; }));
  return s;
}
// Largest loan that still services, holding everything else constant (binary search).
function maxServiceableLoan(){
  const buffer = activeBuffer(), dsrMax = activeDsrMax(), nl = state.calc.newLoan, base = baseFigures();
  const serv = (amt)=>{
    const pmt = PMT(amt, ((parseFloat(nl.rate)||0)+buffer*100)/100, parseFloat(nl.term)||30);
    const totalDebt = base.existingDebt + pmt;
    const ndi = base.income - totalDebt - base.HEM;
    const dsr = base.income>0 ? totalDebt/base.income*100 : 0;
    return ndi>0 && dsr<dsrMax;
  };
  if(!serv(0)) return 0;
  let lo = 0, hi = (parseFloat(nl.amount)||0)*2 + 200000;
  for(let k=0;k<40;k++){ const mid=(lo+hi)/2; if(serv(mid)) lo=mid; else hi=mid; }
  return Math.floor(lo/1000)*1000;
}
function serviceabilityInsights(r){
  const buffer = activeBuffer(), dsrMax = activeDsrMax(), nl = state.calc.newLoan, loan = parseFloat(nl.amount)||0;
  const pol = activePolicy(), ceilingName = pol ? (pol.label||state.lender) : m().label;
  const out = [];
  if(r.verdict==='PASS'){
    out.push({tone:'green', t:`Surplus of ${fmtMoney(r.ndi)}/mo after ${ceilingName}'s ${(buffer*100).toFixed(0)}% assessment buffer and the HEM floor.`});
    const maxLoan = maxServiceableLoan();
    const extra = maxLoan - loan;
    if(extra > 1000) out.push({tone:'green', t:`Borrowing headroom: about ${fmtMoney(extra)} more before this becomes borderline.`});
    if(r.dsr < dsrMax) out.push({tone:'green', t:`DSR ${r.dsr.toFixed(1)}% sits under the ${dsrMax}% ${ceilingName} ceiling.`});
    return out;
  }
  // Not a clean pass — surface concrete levers with $ impact.
  const maxLoan = maxServiceableLoan();
  if(maxLoan > 0 && maxLoan < loan){
    out.push({tone:'amber', t:`Reduce the loan to ${fmtMoney(maxLoan)} (−${fmtMoney(loan-maxLoan)}) to service at ${nl.rate.toFixed(2)}%.`});
  }
  if((parseFloat(nl.term)||30) < 30){
    const newPmt = PMT(loan, ((parseFloat(nl.rate)||0)+buffer*100)/100, 30);
    const delta = r.newLoanMo - newPmt;
    if(delta > 0) out.push({tone:'amber', t:`Extend the term to 30 years → repayment −${fmtMoney(delta)}/mo, NDI +${fmtMoney(delta)}.`});
  }
  const cc = ccLimits();
  if(cc > 0 && r.ndi < 0){
    const perDollar = 0.038/12;                 // assessed cost per $1 of card limit, per month
    const need = Math.min(cc, Math.ceil((-r.ndi)/perDollar/1000)*1000);
    out.push({tone:'amber', t:`Cut credit-card limits by ${fmtMoney(need)} → NDI +${fmtMoney(need*perDollar)}/mo.`});
  }
  if(r.dsr >= dsrMax){
    out.push({tone:'red', t:`DSR ${r.dsr.toFixed(1)}% exceeds the ${dsrMax}% ${ceilingName} ceiling — reduce debt or add income.`});
  }
  // Cross-lender lever: if a lower-buffer lender would service it, surface that.
  if(state.market==='AU'){
    const cheaper = cheapestServiceableLender();
    if(cheaper && cheaper.l!==state.lender) out.push({tone:'amber', t:`Switch to ${cheaper.label} (${(cheaper.buffer*100).toFixed(0)}% buffer) → serviceable as structured. See Lender Compare.`});
  }
  if(!out.length) out.push({tone:'red', t:'Assessed income is too low for this loan — an additional applicant or a larger deposit is required.'});
  return out;
}

const PILOT_STEPS = [

  {t:'Rank lenders', d:'Score every in-market lender by approvability'},

  const btn = document.getElementById('pilotBtn'); if(btn){ btn.style.opacity=.55; btn.textContent='Running…'; }
  runPilotStep(0);

function runPilotStep(i){
  if(i >= PILOT_STEPS.length){ finishPilot(); return; }
  pilotStatus[i] = 1; renderPilotSteps();
  if(i===1) applyExtractedProfile();   // the "zero re-keying" moment: write into shared calc state
  setTimeout(()=>{ pilotStatus[i] = 2; renderPilotSteps(); runPilotStep(i+1); }, 1050);

function applyExtractedProfile(){
  state.calc.entities = [

     liabilities:[{type:'credit_card', balance:15000, rate:21.9, term:0},{type:'car', balance:18500, rate:8.9, term:5}]},

  ];

  state.calc.newLoan = {amount:785000, rate:6.24, term:30};

function finishPilot(){
  const ranked = rankLenders();
  const top = ranked.find(x=>x.serviceable) || ranked[0];
  if(top && state.market==='AU') state.lender = top.l;   // adopt the recommended lender's policy
  const r = computeServiceability();
  COMMENTARY[0].text = mockCommentary('pilot');   // synchronous draft (safe if user navigates away)
  pilotResult = {r, top};
  pilotState = 'done';
  const btn = document.getElementById('pilotBtn'); if(btn){ btn.style.opacity=1; btn.textContent='▶ Re-run AI Pilot'; }
  renderPilotResults();
  toast('AI Pilot complete — deal assessed end-to-end', 'ok');
}
function renderPilotResults(){
  const box = document.getElementById('pilotResults'); if(!box || !pilotResult) return;
  const {r, top} = pilotResult;
  box.innerHTML = `
    <div class="verdict ${r.verdict.toLowerCase()}" style="margin-top:16px">
      <div class="v-lbl">AI Pilot Verdict</div>
      <div class="v-big">${r.verdict}</div>
      <div class="v-sub">${top && top.serviceable ? ('Recommended lender: '+(top.label||top.l)+' @ '+top.rate.toFixed(2)+'% ('+(top.buffer*100).toFixed(0)+'% buffer)') : 'No lender services this structure — see the levers below'}</div>
    </div>
    <div class="res-grid">
      <div class="res-box"><div class="rl">DSR</div><div class="rv mono">${r.dsr.toFixed(1)}%</div></div>
      <div class="res-box"><div class="rl">NDI/mo</div><div class="rv mono" style="color:${r.ndi>=0?'var(--green)':'var(--red)'}">${fmtMoney(r.ndi)}</div></div>
      <div class="res-box"><div class="rl">Income/mo</div><div class="rv mono">${fmtMoney(r.income)}</div></div>
    </div>
    <div class="card" style="padding:18px;margin-bottom:14px">
      <h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Next-best levers</h4>
      ${serviceabilityInsights(r).map(x=>`<div class="insight-row"><span class="ic" style="color:var(--${x.tone})">${x.tone==='green'?'✓':x.tone==='amber'?'➜':'✕'}</span><span style="font-size:12.5px;font-weight:500">${x.t}</span></div>`).join('')}
    </div>
    <div class="card" style="padding:18px;margin-bottom:14px">
      <h4 style="font-size:13px;font-weight:700;margin-bottom:6px">Auto-drafted overview</h4>
      <div class="comm-text">${COMMENTARY[0].text}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="navigate('serviceability')">Review serviceability →</button>
      <button class="btn" onclick="navigate('compare')">View lender ranking →</button>
      <button class="btn" onclick="navigate('commentary')">Open commentary →</button>
    </div>`;
}

/* ============================================================
   UTILITIES — toast, loader, login
   ============================================================ */
function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast '+(type==='ok'?'ok':type==='err'?'err':'info');
  t.innerHTML = (type==='ok'?'✓':type==='err'?'✕':'ℹ') + ' ' + msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(40px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 3200);
}
function showLoader(msg){ document.getElementById('loaderMsg').textContent=msg||'Working…'; document.getElementById('loader').classList.add('show'); }
function hideLoader(){ document.getElementById('loader').classList.remove('show'); }

function doLogin(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  toast('Welcome back, Jordan!', 'ok');
  init();
}
document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

/* ---------- Init ---------- */
function init(){
  renderCountryDD();
  renderNav();
  navigate('dashboard');
  // simulate live AI progress on the processing deal
  setInterval(()=>{
    const d = DEALS.find(x=>x.status==='AI_PROCESSING');
    if(d && d.progress<99){ d.progress = Math.min(99, d.progress+1); if(state.page==='dashboard') renderDealGrid(); }
  }, 2500);
}
</script>
