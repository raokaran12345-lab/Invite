[build]
  publish = "."
  functions = "netlify/functions"

# Friendly /api/* routes → Netlify Functions
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200
